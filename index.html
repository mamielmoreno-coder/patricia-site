<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patricia</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  overflow: hidden;
  font-family: Arial;
}

#bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, #111 0%, #000 100%);
  animation: breathe 8s infinite ease-in-out;
}

@keyframes breathe {
  0%,100% { opacity: 1; }
  50% { opacity: 0.85; }
}

#text {
  position: absolute;
  width: 100%;
  text-align: center;
  top: 40%;
  font-size: 20px;
  opacity: 0;
  transition: opacity 1.5s;
  padding: 0 20px;
}

.show {
  opacity: 1;
}
</style>
</head>

<body>

<div id="bg"></div>
<div id="text"></div>

<script>

const moments = [

  /* 🔥 YOUR TEXT FIRST */
  { t:"Life has more meaning with you...", d:5000 },
  { t:"I have loved anyone as much as I have loved you.", d:5000 },
  { t:"I have never wanted to do so many things with anyone as much as I want with you.", d:6000 },
  { t:"Your love is unmatched and your care can't be surpassed...", d:5000 },
  { t:"you don't know how lovely you are Patricia ♥", d:6000 },

  { t:"", d:3000 },

  /* ✈️ AIRPORT */
  { t:"I remember waiting for you…", d:3500 },
  { t:"", d:1500 },
  { t:"I didn’t know if I would recognize you instantly.", d:4000 },
  { t:"But I did.", d:2500 },

  { t:"", d:3000 },

  /* 🤝 HUG */
  { t:"That first hug…", d:3000 },
  { t:"didn’t feel like the first at all.", d:5000 },

  { t:"", d:3500 },

  /* 🌊 FERRY */
  { t:"That moment… on the ferry.", d:4000 },
  { t:"", d:2500 },
  { t:"Your hands were cold…", d:4000 },
  { t:"I didn’t want to let go.", d:5000 },

  { t:"", d:4000 },

  /* 🎯 FINAL */
  { t:"Patricia", d:6000 }

];

let i = 0;
const text = document.getElementById("text");

document.body.onclick = () => {
  flow();
  document.body.onclick = null;
};

function flow() {

  if (i >= moments.length) return;

  text.classList.remove("show");

  setTimeout(() => {
    text.innerHTML = moments[i].t;
    text.classList.add("show");
  }, 300);

  setTimeout(() => {
    i++;
    flow();
  }, moments[i].d);
}

</script>

</body>
</html>
