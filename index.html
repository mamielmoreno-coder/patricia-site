<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Caveat', cursive;
  background: #f5f1dc;
  color: #222;
}

/* CENTER */
.center {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

/* TEXT */
#introText, #passwordText, #textMain {
  font-size: 26px;
  max-width: 90%;
  line-height: 1.6;
  white-space: pre-line;
}

/* 🔥 BLACK INPUT + BUTTON */
input {
  padding: 10px;
  font-size: 18px;
  margin-top: 15px;
  text-align: center;
  background: black;
  color: white;
  border: none;
  outline: none;
}

button {
  margin-top: 15px;
  padding: 8px 20px;
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}

/* BUTTERFLY (UNCHANGED FROM LAST VERSION) */
#butterfly {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 26px;
  display: none;
  cursor: pointer;

  background: black;
  color: white;
  width: 60px;
  height: 60px;
  border-radius: 50%;

  display: flex;
  align-items: center;
  justify-content: center;
}

/* FINAL PAGE */
#photoContainer {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  background: #f5f1dc;
  flex-direction: column;
}

#photo {
  width: 100%;
  height: 75vh;
  object-fit: cover;
}

#caption {
  height: 25vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  padding: 0 15px;
  text-align: center;
}

/* CURSOR */
.cursor {
  display: inline-block;
  width: 2px;
  background: #222;
  margin-left: 3px;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}
</style>
</head>

<body>

<div id="introScreen" class="center">
  <div id="introText"></div>
  <button onclick="startIntro()">Start</button>
</div>

<div id="lock" class="center" style="display:none">
  <div id="passwordText"></div>
  <input id="password">
  <button onclick="check()">Enter</button>
</div>

<div id="main" class="center" style="display:none">
  <div id="textMain"></div>
  <div id="butterfly">🦋</div>
</div>

<div id="photoContainer">
  <img id="photo" src="Screenshot_2026-04-02-12-47-16-582_com.miui.gallery.jpg">
  <div id="caption">
    Istanbul and me both of us had the best days when you were here✨
  </div>
</div>

<audio id="writeSound" src="write.mp3" loop></audio>
<audio id="bgMusic" src="Jamie-Duffy-Solas-Official-Video.mp3"></audio>

<script>

let audioUnlocked = false;

function unlockAudio(){
  if(!audioUnlocked){
    let write = document.getElementById("writeSound");
    write.volume = 0.3;
    audioUnlocked = true;
  }
}

const introMessage = "Only open if you are alone…\n\nand if so\n\nclick start to explore";
const passwordMessage = "Think for a moment…\n\nWho shines the most this year?";

function inkWrite(el, text, speed = 90) {

  el.innerHTML = "";

  let cursor = document.createElement("span");
  cursor.className = "cursor";
  el.appendChild(cursor);

  let sound = document.getElementById("writeSound");

  if(audioUnlocked){
    sound.currentTime = 0;
    sound.play().catch(()=>{});
  }

  let i = 0;

  function type() {

    if (i < text.length) {

      if (text[i] === "\n") {
        el.insertBefore(document.createElement("br"), cursor);
      } else {
        let span = document.createElement("span");
        span.textContent = text[i];
        el.insertBefore(span, cursor);
      }

      i++;
      setTimeout(type, speed);

    } else {
      cursor.remove();
      sound.pause();
    }
  }

  type();
}

function fadeInMusic(){
  let music = document.getElementById("bgMusic");
  music.volume = 0;
  music.play().catch(()=>{});

  let vol = 0;
  let interval = setInterval(()=>{
    if(vol < 0.7){
      vol += 0.03;
      music.volume = vol;
    } else {
      clearInterval(interval);
    }
  },200);
}

window.onload = () => {
  inkWrite(document.getElementById("introText"), introMessage);
};

function startIntro(){
  unlockAudio();
  document.getElementById("introScreen").style.display="none";
  document.getElementById("lock").style.display="flex";
  inkWrite(document.getElementById("passwordText"), passwordMessage);
}

let tries = 0;

function check(){
  unlockAudio();

  let val = document.getElementById("password").value.toLowerCase().trim();
  let t = document.getElementById("passwordText");

  if(val === "patricia"){
    document.getElementById("lock").style.display="none";
    document.getElementById("main").style.display="flex";
    start();
    return;
  }

  tries++;

  let msg="";
  if(tries===1) msg="Think about who makes this year shine the most...";
  else if(tries===2) msg="Someone who changed your world more than anything...";
  else if(tries===3) msg="You already have her name in your heart...";
  else if(tries===4) msg="Whose special day is today...";
  else if(tries===5) msg="The most beautiful name...";
  else msg="Say her name...";

  inkWrite(t, msg);
}

const pages = [
["welcome","Did you know this year is the brightest year ever?","And do you know why?","This year is the brightest year ever because you are shining the most ever Patricia"],
["you must wonder what is this now, lean back; Think, watch, listen and enjoy"],
["Who are you?","I want you to think"],
["I don't know your answer however I am so proud of you"],
["what do you want?","I want you to focus"],
["By observing yourself that's the key"],
["what do you do?","Are you just a surgeon?","I want you to empty your mind and contemplate"],
["You are a lot of things. You are more than just a surgeon"],
["Now take a deep breath nice and smooth"],
["Ready for a journey? Buckle up!"],
["I love you birthday girl You are the most beautiful thing in the world❤"]
];

let i = 0;
let text = document.getElementById("textMain");
let butterfly = document.getElementById("butterfly");

function start(){
  show();
}

function show(){
  let full = pages[i].join("\n\n");
  inkWrite(text, full);

  setTimeout(()=>{
    butterfly.style.display="flex";
  }, full.length * 90 + 800);
}

butterfly.onclick = () => {

  unlockAudio();

  if(i === 9){
    fadeInMusic();
  }

  if(i === 10){
    document.getElementById("main").style.display="none";
    document.getElementById("photoContainer").style.display="flex";
    return;
  }

  i++;
  butterfly.style.display="none";
  show();
};

</script>

</body>
</html>
