<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Caveat', cursive;
  color: #222;
  transition: background 2s ease;

  background-image: radial-gradient(rgba(0,0,0,0.03) 1px, transparent 1px);
  background-size: 3px 3px;
}

/* BACKGROUND CHAPTERS */
.bg1 { background: #f5f1dc; }
.bg2 { background: #efe7c9; }
.bg3 { background: #e8ddb8; }

/* CENTER */
.center {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

/* TEXT */
#introText, #passwordText, #textMain {
  font-size: 26px;
  max-width: 90%;
  white-space: pre-line;
  line-height: 1.6;
  transition: opacity 0.6s;
}

/* INPUT */
input {
  padding: 10px;
  font-size: 18px;
  margin-top: 15px;
  text-align: center;
}

button {
  margin-top: 10px;
  padding: 8px 20px;
}

/* BUTTERFLY */
#butterfly {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 40px;
  display: none;
  cursor: pointer;
}

/* MEMORY */
#photoContainer {
  display: none;
  width: 100%;
  min-height: 100vh;
  background: #f5f1dc;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#photo {
  width: 95%;
  max-width: 500px;
  border-radius: 10px;
  opacity: 0;
  transition: opacity 2s ease, transform 6s ease;
}

#caption {
  margin-top: 10px;
  font-size: 24px;
  padding: 0 15px;
  opacity: 0;
  transition: opacity 2s ease;
}

/* CURSOR */
.cursor {
  display: inline-block;
  width: 2px;
  background: #222;
  margin-left: 3px;
  animation: blink 1s infinite;
}

@keyframes blink { 50% { opacity: 0; } }

/* INK EFFECT */
.letter {
  opacity: 0;
  animation: inkAppear 0.4s forwards;
}

@keyframes inkAppear {
  from { opacity: 0; filter: blur(2px); }
  to { opacity: 1; filter: blur(0); }
}

@keyframes writingShake {
  0% { transform: translate(0,0); }
  25% { transform: translate(0.5px,-0.5px); }
  50% { transform: translate(-0.5px,0.5px); }
  100% { transform: translate(0,0); }
}

/* WARM OVERLAY */
body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(255,230,150,0.08);
  pointer-events: none;
}
</style>
</head>

<body class="bg1">

<!-- INTRO -->
<div id="introScreen" class="center">
  <div id="introText">
    Only open if you are alone…\n\nand if so\n\nclick start to explore
  </div>
  <button onclick="startIntro()">Start</button>
</div>

<!-- PASSWORD -->
<div id="lock" class="center" style="display:none">
  <div id="passwordText">
    Think for a moment…\n\nWho shines the most this year?
  </div>
  <input id="password">
  <button onclick="check()">Enter</button>
</div>

<!-- MAIN -->
<div id="main" class="center" style="display:none">

<audio id="music" src="Jamie-Duffy-Solas-Official-Video.mp3"></audio>
<audio id="ambient" src="ambient.mp3" loop></audio>
<audio id="writeSound" src="write.mp3" loop></audio>

<div id="textMain"></div>

<div id="butterfly">🦋</div>

</div>

<!-- FINAL -->
<div id="photoContainer">
  <img id="photo" src="Screenshot_2026-04-02-12-47-16-582_com.miui.gallery.jpg">
  <div id="caption">
    Istanbul and me both of us had the best days when you were here✨
  </div>
</div>

<script>

/* INTRO */
function startIntro(){
  document.getElementById("introScreen").style.display="none";
  document.getElementById("lock").style.display="flex";
}

/* PASSWORD */
let tries=0;

function check(){
  let t=document.getElementById("passwordText");
  let val=document.getElementById("password").value.toLowerCase().trim();

  if(val==="patricia"){
    document.getElementById("lock").style.display="none";
    document.getElementById("main").style.display="flex";
    start();
    return;
  }

  tries++;
  t.style.opacity=0;

  setTimeout(()=>{
    let msg="";
    if(tries===1) msg="Think about who makes this year shine the most...";
    else if(tries===2) msg="Someone who changed your world more than anything...";
    else if(tries===3) msg="You already have her name in your heart...";
    else if(tries===4) msg="Whose special day is today...";
    else if(tries===5) msg="The most beautiful name...";
    else msg="Say her name...";

    t.innerHTML=msg;
    t.style.opacity=1;
  },300);
}

/* TEXT */
const pages=[ ...same as before... ];

let i=0;
const text=document.getElementById("textMain");
const butterfly=document.getElementById("butterfly");
const music=document.getElementById("music");

/* BACKGROUND */
function updateBackground(){
  document.body.className="";
  if(i<3) document.body.classList.add("bg1");
  else if(i<7) document.body.classList.add("bg2");
  else document.body.classList.add("bg3");
}

/* INK WRITING */
function inkWrite(el,textStr,speed=50){
  let sound=document.getElementById("writeSound");
  sound.volume=0.2;
  sound.play();

  el.innerHTML="";
  let i=0;

  function write(){
    if(i<textStr.length){
      let ch=textStr[i];
      el.innerHTML += ch=="\n"?"<br>":`<span class="letter">${ch}</span>`;
      el.innerHTML+='<span class="cursor"></span>';
      el.style.animation="writingShake 0.2s";
      i++;
      setTimeout(write,speed);
    } else {
      sound.pause();
      el.innerHTML=textStr;
    }
  }
  write();
}

/* SHOW */
function show(){
  updateBackground();
  let full=pages[i].join("\n\n");
  inkWrite(text,full,50);

  setTimeout(()=>butterfly.style.display="block", full.length*50+1200);
}

/* START */
function start(){
  document.getElementById("ambient").volume=0.1;
  document.getElementById("ambient").play();
  show();
}

/* CLICK */
butterfly.onclick=function(){

  if(i===9){
    music.volume=0;
    music.play();
    let v=0;
    let f=setInterval(()=>{
      v+=0.05;
      music.volume=v;
      if(v>=0.6) clearInterval(f);
    },200);

    i=10;
    show();
    return;
  }

  if(i===10){
    document.getElementById("main").style.display="none";
    let c=document.getElementById("photoContainer");
    let p=document.getElementById("photo");
    let cap=document.getElementById("caption");

    setTimeout(()=>c.style.display="flex",800);
    setTimeout(()=>p.style.opacity=1,1200);
    setTimeout(()=>p.style.transform="scale(1.02)",1500);
    setTimeout(()=>cap.style.opacity=1,2500);
    return;
  }

  i++;
  butterfly.style.display="none";
  setTimeout(show,400);
};

</script>
</body>
</html>
