<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Patricia ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial, sans-serif;
  color: white;
}

/* 🌌 Moving galaxy */
.galaxy {
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at center, #1a0026, #000);
  animation: rotate 60s linear infinite;
}

@keyframes rotate {
  from { transform: rotate(0deg) scale(1.2); }
  to { transform: rotate(360deg) scale(1.2); }
}

/* ✨ Stars */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
  from { opacity: 0.2; }
  to { opacity: 1; }
}

/* 🦋 Butterfly */
.butterfly {
  position: absolute;
  width: 80px;
  animation: fly 10s infinite linear;
}

@keyframes fly {
  0% { transform: translate(-10vw, 80vh) rotate(0deg); }
  50% { transform: translate(50vw, 20vh) rotate(180deg); }
  100% { transform: translate(110vw, 70vh) rotate(360deg); }
}

/* 💬 Text */
.container {
  position: absolute;
  width: 100%;
  top: 50%;
  transform: translateY(-50%);
  text-align: center;
}

h1 {
  font-size: 2.5rem;
  opacity: 0;
  animation: fadeIn 3s forwards;
}

p {
  margin-top: 20px;
  opacity: 0;
  animation: fadeIn 5s forwards;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* ❤️ Button */
button {
  margin-top: 30px;
  padding: 12px 25px;
  border-radius: 25px;
  border: none;
  background: white;
  color: black;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #ff4d6d;
  color: white;
}

/* 💔 Final message */
.final {
  display: none;
  margin-top: 30px;
  font-size: 1.4rem;
  line-height: 1.6;
  animation: fadeIn 3s forwards;
}
</style>
</head>

<body>

<div class="galaxy"></div>

<!-- stars generator -->
<script>
for(let i=0;i<150;i++){
  let s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"vw";
  s.style.top=Math.random()*100+"vh";
  s.style.animationDuration=(1+Math.random()*2)+"s";
  document.body.appendChild(s);
}
</script>

<!-- butterfly -->
<img class="butterfly" src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Butterfly_icon.svg/1024px-Butterfly_icon.svg.png">

<div class="container">
  <h1>Patricia…</h1>
  <p>I tried to put something into words… but this is what it feels like instead.</p>

  <button onclick="reveal()">Open it</button>

  <div class="final" id="finalText">
    Not everything in life needs logic…  
    Some things are just felt.  

    And somehow…  
    you became one of those things for me. ❤️
  </div>
</div>

<script>
function reveal(){
  document.getElementById("finalText").style.display="block";
}
</script>

</body>
</html>
