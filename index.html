<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patricia</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  overflow: hidden;
}

/* START SCREEN */
#start {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: black;
  z-index: 10;
  font-size: 24px;
}

/* BACKGROUND */
#bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  opacity: 0;
  transition: opacity 2s;
}

/* TEXT */
#text {
  position: absolute;
  bottom: 20%;
  width: 100%;
  text-align: center;
  font-size: 22px;
  opacity: 0;
  transition: opacity 2s;
  padding: 0 20px;
}

.show {
  opacity: 1;
}
</style>
</head>

<body>

<div id="start" onclick="start()">Tap to begin</div>

<div id="bg"></div>
<div id="text"></div>

<script>

const scenes = [
  {
    bg: "https://images.unsplash.com/photo-1436491865332-7a61a109cc05",
    lines: [
      "I remember waiting for you…",
      "I didn’t know if I would recognize you instantly.",
      "But I did."
    ]
  },
  {
    bg: "https://images.unsplash.com/photo-1436491865332-7a61a109cc05",
    lines: [
      "That first hug…",
      "didn’t feel like the first at all."
    ]
  },
  {
    bg: "https://images.unsplash.com/photo-1500375592092-40eb2168fd21",
    lines: [
      "",
      "That moment… on the ferry."
    ]
  },
  {
    bg: "https://images.unsplash.com/photo-1500375592092-40eb2168fd21",
    lines: [
      "Your hands were cold…",
      "I just wanted to stay there a little longer."
    ]
  },
  {
    bg: "",
    lines: [
      "Some moments stay.",
      "You are one of them."
    ]
  }
];

let scene = 0;
let line = 0;

function start() {
  document.getElementById("start").style.display = "none";
  nextScene();
}

function nextScene() {

  if (scene >= scenes.length) return;

  const bg = document.getElementById("bg");
  const text = document.getElementById("text");

  const current = scenes[scene];

  bg.style.opacity = 0;

  setTimeout(() => {

    if (current.bg) {
      bg.style.backgroundImage = `url(${current.bg})`;
    }

    bg.style.opacity = 1;

    line = 0;
    showLine(current);

  }, 1000);
}

function showLine(current) {

  if (line >= current.lines.length) {
    scene++;
    setTimeout(nextScene, 3000);
    return;
  }

  const text = document.getElementById("text");

  text.classList.remove("show");

  setTimeout(() => {
    text.innerHTML = current.lines[line];
    text.classList.add("show");
    line++;
  }, 800);

  setTimeout(() => {
    showLine(current);
  }, 3000);
}

</script>

</body>
</html>
