<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #f5f1dc;
  font-family: 'Caveat', cursive;
  color: #222;
}

/* CENTER */
.center {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

/* TEXT */
#text, #textMain, #introText, #passwordText {
  font-size: 26px;
  max-width: 90%;
  line-height: 1.6;
  min-height: 140px;
  opacity: 0;
}

/* FADE */
.textFade {
  opacity: 0;
}
.textFade.show {
  opacity: 1;
}

/* INPUT */
input {
  padding: 10px;
  font-size: 18px;
  margin-top: 15px;
  text-align: center;
  background: black;
  color: white;
  border: none;
}

button {
  margin-top: 10px;
  padding: 8px 20px;
  background: black;
  color: white;
  border: none;
}

/* 🦋 BUTTERFLY */
#butterfly {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  font-size: 40px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 2s ease, transform 2s ease;
}

#butterfly.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
  pointer-events: auto;
}

/* MEMORY */
#photoContainer {
  display: none;
  width: 100%;
  height: 100vh;
  background: #f5f1dc;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

#photo {
  width: 90%;
  border-radius: 10px;
}

#caption {
  margin-top: 20px;
  font-size: 24px;
  text-align: center;
}

/* CURSOR */
.cursor {
  display: inline-block;
  width: 2px;
  background: #222;
  animation: blink 1s infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* ✨ STRONG GLOW */
.letterGlow {
  animation: glowFlicker 0.9s ease;
}
@keyframes glowFlicker {
  0% {
    text-shadow: 0 0 20px white, 0 0 35px #ffdca0;
    opacity: 0.3;
  }
  50% {
    text-shadow: 0 0 25px #fff0b0;
  }
  100% {
    text-shadow: none;
    opacity: 1;
  }
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="introScreen" class="center">
  <div id="introText"></div>
  <button onclick="startIntro()">Start</button>
</div>

<!-- PASSWORD -->
<div id="lock" class="center" style="display:none">
  <div id="passwordText"></div>
  <input id="password">
  <button onclick="check()">Enter</button>
</div>

<!-- MAIN -->
<div id="main" class="center" style="display:none">
  <div id="textMain"></div>
  <div id="butterfly">🦋</div>
</div>

<!-- FINAL -->
<div id="photoContainer">
  <img id="photo" src="Screenshot_2026-04-02-12-47-16-582_com.miui.gallery.jpg">
  <div id="caption">Istanbul and me both of us had the best days when you were here✨</div>
</div>

<audio id="music" src="Jamie-Duffy-Solas-Official-Video.mp3"></audio>

<script>

/* MUSIC */
function fadeInMusic(){
  let m = document.getElementById("music");
  m.volume = 0;
  m.play().catch(()=>{});
  let v = 0;
  let i = setInterval(()=>{
    if(v < 0.6){ v += 0.02; m.volume = v; }
    else clearInterval(i);
  },200);
}

/* WRITING */
function inkWrite(el, text, speed = 90, callback){

  el.innerHTML = "";
  el.classList.add("textFade");

  let cursor = document.createElement("span");
  cursor.className = "cursor";

  let emotional = ["love","beautiful","you","special","heart"];
  let isEmotional = emotional.some(w=>text.toLowerCase().includes(w));

  let baseSpeed = isEmotional ? 120 : speed;

  let isIntro = text.includes("Only open if you are alone");

  let fadeTime = isIntro ? 1800 : 1200;
  let startDelay = isIntro ? 900 : 350;

  let i = 0;

  setTimeout(()=>{
    el.style.transition = `opacity ${fadeTime}ms`;
    el.classList.add("show");
  },50);

  setTimeout(()=>{

    el.appendChild(cursor);

    function type(){
      if(i < text.length){

        let c = text[i];

        if(c === "\n"){
          el.insertBefore(document.createElement("br"), cursor);
        } else {
          let s = document.createElement("span");
          s.textContent = c;
          s.classList.add("letterGlow");
          el.insertBefore(s, cursor);
        }

        i++;

        let pause = 0;
        if(c === ",") pause = 120;
        if(c === "." || c==="!" || c==="?") pause = 300;

        setTimeout(type, baseSpeed + Math.random()*30 + pause);

      } else {
        cursor.remove();
        if(callback) callback();
      }
    }

    type();

  }, startDelay);
}

/* INTRO */
const introMessage = "Only open if you are alone…\n\nand if so\n\nclick start to explore";
const passwordMessage = "Think for a moment…\n\nWho shines the most this year?";

window.onload = ()=>{
  inkWrite(document.getElementById("introText"), introMessage);
};

function startIntro(){
  document.getElementById("introScreen").style.display="none";
  document.getElementById("lock").style.display="flex";
  inkWrite(document.getElementById("passwordText"), passwordMessage);
}

/* PASSWORD */
let tries=0;
function check(){

let val=document.getElementById("password").value.toLowerCase();
let t=document.getElementById("passwordText");

if(val==="patricia"){
  document.getElementById("lock").style.display="none";
  document.getElementById("main").style.display="flex";
  start();
  return;
}

tries++;

let msg="";
if(tries===1) msg="Think about who makes this year shine the most...";
else if(tries===2) msg="Someone who changed your world more than anything...";
else if(tries===3) msg="You already have her name in your heart...";
else msg="Say her name...";

inkWrite(t,msg);
}

/* PAGES */
const pages=[
["welcome","Did you know this year is the brightest year ever?","And do you know why?","This year is the brightest year ever because you are shining the most ever Patricia"],
["you must wonder what is this now, lean back; Think, watch, listen and enjoy"],
["Who are you?","I want you to think"],
["I don't know your answer however I am so proud of you"],
["what do you want?","I want you to focus"],
["By observing yourself that's the key"],
["what do you do?","Are you just a surgeon?","I want you to empty your mind and contemplate"],
["You are a lot of things. You are more than just a surgeon"],
["Now take a deep breath nice and smooth"],
["Ready for a journey? Buckle up!"],
["I love you birthday girl You are the most beautiful thing in the world❤"]
];

let i=0;
let text=document.getElementById("textMain");
let butterfly=document.getElementById("butterfly");

function start(){ show(); }

function show(){

let full=pages[i].join("\n\n");

inkWrite(text, full, 90, ()=>{

  setTimeout(()=>{
    butterfly.classList.add("show");
  },400);

  setTimeout(()=>{
    butterfly.style.pointerEvents="auto";
  },1200);

});
}

/* CLICK */
butterfly.onclick=()=>{

if(i===9) fadeInMusic();

if(i===10){
  document.getElementById("main").style.display="none";
  document.getElementById("photoContainer").style.display="flex";
  return;
}

i++;

butterfly.style.pointerEvents="none";
butterfly.classList.remove("show");

setTimeout(()=>{
  show();
},600);

};

</script>

</body>
</html>
