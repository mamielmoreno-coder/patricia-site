<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #f5f1dc;
  font-family: 'Caveat', cursive;
  color: #222;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

/* CENTER */
.center {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* TEXT */
#text, #textMain {
  font-size: 26px;
  max-width: 90%;
  transition: opacity 0.8s ease;
}

/* INPUT */
input {
  padding: 10px;
  font-size: 18px;
  margin-top: 15px;
  text-align: center;
}

button {
  margin-top: 10px;
  padding: 8px 20px;
}

/* BUTTERFLY */
#butterfly {
  position: fixed;
  bottom: 40px;
  width: 90px;
  left: 50%;
  transform: translateX(-50%);
  display: none;
}

/* PHOTO */
#photo {
  display: none;
  position: fixed;
  top: 0;
  width: 100%;
  height: 80%;
  object-fit: cover;
}

#caption {
  display: none;
  position: fixed;
  bottom: 20px;
  width: 100%;
  font-size: 20px;
}
</style>
</head>

<body>

<!-- PASSWORD -->
<div id="lock" class="center">

<div id="text">
Think for a moment…<br><br>
Who shines the most this year?
</div>

<input id="password">
<button onclick="check()">Enter</button>

</div>

<!-- MAIN -->
<div id="main" class="center" style="display:none">

<audio id="music" src="Jamie-Duffy-Solas-Official-Video.mp3"></audio>

<img id="photo" src="Screenshot_2026-04-02-12-47-16-582_com.miui.gallery.jpg">
<div id="caption">Istanbul and me both of us had the best days when you were here✨</div>

<div id="textMain"></div>

<img id="butterfly" src="file_00000000914c720a8541e3890677c924.png">

</div>

<script>

/* PASSWORD */
let tries = 0;

function check(){

let t = document.getElementById("text");
let val = document.getElementById("password").value.toLowerCase();

if(val==="patricia"){

document.getElementById("lock").style.display="none";
document.getElementById("main").style.display="flex";

start();

}else{

tries++;

t.style.opacity=0;

setTimeout(()=>{

if(tries===1) t.innerHTML="Think about who makes this year shine...";
else if(tries===2) t.innerHTML="Someone who changed your world...";
else if(tries===3) t.innerHTML="You already know...";
else if(tries===4) t.innerHTML="Whose special day is today...";
else if(tries===5) t.innerHTML="The most beautiful name...";
else t.innerHTML="Say her name...";

t.style.opacity=1;

},400);

}

}

/* EXPERIENCE */
const pages=[
["welcome...","Did you know this year is the brightest year ever?","Because you are shining the most ever Patricia"],
["Think, watch, listen"],
["Who are you"],
["I am proud of you"],
["What do you want"],
["Observe yourself"],
["Are you just a surgeon"],
["You are more"],
["Take a breath"],
["Ready"],
["I love you birthday girl"]
];

let i=0;

let text=document.getElementById("textMain");
let butterfly=document.getElementById("butterfly");
let music=document.getElementById("music");

function start(){
show();
}

/* TEXT */
function show(){

text.innerHTML="";
let lines=pages[i];
let j=0;

function next(){
if(j>=lines.length) return;
text.innerHTML+=lines[j]+"<br><br>";
j++;
setTimeout(next,1200);
}

next();

setTimeout(()=>{
butterfly.style.display="block";
},1500);

}

/* CLICK */
butterfly.onclick=function(){

if(i===9){
music.play();
i=10;
show();
return;
}

if(i===10){

text.style.display="none";
butterfly.style.display="none";

document.getElementById("photo").style.display="block";
document.getElementById("caption").style.display="block";

return;
}

i++;
butterfly.style.display="none";
setTimeout(show,400);

};

</script>

</body>
</html>
