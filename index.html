<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patricia</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
  padding: 20px;
}

/* TEXT FIXED */
#text {
  font-size: 22px;
  display: block;
  max-width: 90%;
}

/* BUTTON */
#btn {
  margin-top: 30px;
  padding: 14px 24px;
  font-size: 16px;
  background: white;
  color: black;
  border: none;
  border-radius: 10px;
  display: none;
}

/* PHOTO FULL SCREEN STYLE */
#photo {
  width: 100%;
  height: auto;
  max-height: 70vh;
  object-fit: cover;
  border-radius: 12px;
  margin-bottom: 20px;
  display: none;
}
</style>
</head>

<body>

<audio id="music" src="Jamie-Duffy-Solas-Official-Video.mp3" loop></audio>

<img id="photo" src="Screenshot_2026-04-02-12-47-16-582_com.miui.gallery.jpg">

<div id="text">welcome</div>
<button id="btn"></button>

<script>

const pages = [

"welcome",

"you must wonder what is this now,<br><br>lean back;<br><br>Think, watch, listen and enjoy",

"Who are you?<br><br>I want you to think",

"I don't know your answer however I am so proud of you",

"what do you want?<br><br>I want you to focus",

"By observing yourself that's the key",

"what do you do?<br><br>Are you just a surgeon?<br><br><br>I want you to empty your mind and contemplate",

"You are a lot of things.<br><br>You are more than just a surgeon",

"Now take a deep breath<br><br>nice and smooth",

"Ready for a journey?<br><br>Buckle up!",

"I love you birthday girl<br><br>You are the most beautiful thing in the world ❤",

"Istanbul and me both of us had the best days when you were here✨"

];

let i = 0;
const text = document.getElementById("text");
const btn = document.getElementById("btn");
const photo = document.getElementById("photo");

/* SHOW BUTTON AFTER 2s */
setTimeout(showButton, 2000);

btn.onclick = function() {

  if (i === 9) {
    document.getElementById("music").play();
  }

  i++;

  if (i >= pages.length) return;

  text.innerHTML = pages[i];

  /* SHOW PHOTO ONLY LAST PAGE */
  if (i === 11) {
    photo.style.display = "block";
  } else {
    photo.style.display = "none";
  }

  showButton();
};

function showButton() {

  btn.style.display = "none";

  setTimeout(() => {

    if (i === 11) {
      btn.style.display = "none";
      return;
    }

    btn.style.display = "block";

    if (i === 9) {
      btn.innerHTML = "Explore and play";
    } else {
      btn.innerHTML = "Explore more";
    }

  }, 2000);
}

</script>

</body>
</html>
