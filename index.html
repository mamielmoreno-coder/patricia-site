<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #f5f1dc;
  font-family: 'Caveat', cursive;
  color: #222;
}

/* CENTER */
.center {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

/* TEXT */
#introText, #passwordText, #textMain {
  font-size: 26px;
  max-width: 90%;
  transition: opacity 0.6s;
}

/* INPUT */
input {
  padding: 10px;
  font-size: 18px;
  margin-top: 15px;
  text-align: center;
}

button {
  margin-top: 10px;
  padding: 8px 20px;
}

/* 🦋 BUTTERFLY */
#butterfly {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 40px;
  display: none;
  cursor: pointer;
}

/* MEMORY */
#photoContainer {
  display: none;
  width: 100%;
  min-height: 100vh;
  background: #f5f1dc;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#photo {
  width: 95%;
  max-width: 500px;
  height: auto;
  border-radius: 10px;
  opacity: 0;
  transition: opacity 1.5s ease, transform 5s ease;
}

#caption {
  margin-top: 10px;
  font-size: 24px;
  text-align: center;
  padding: 0 15px;
  max-width: 500px;
  opacity: 0;
  transition: opacity 1.5s ease;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="introScreen" class="center">
  <div id="introText">
    Only open if you are alone…<br><br>
    and if so<br><br>
    click start to explore
  </div>
  <button onclick="startIntro()">Start</button>
</div>

<!-- PASSWORD -->
<div id="lock" class="center" style="display:none">
  <div id="passwordText">
    Think for a moment…<br><br>
    Who shines the most this year?
  </div>
  <input id="password">
  <button onclick="check()">Enter</button>
</div>

<!-- MAIN -->
<div id="main" class="center" style="display:none">

<audio id="music" src="Jamie-Duffy-Solas-Official-Video.mp3"></audio>

<div id="textMain"></div>

<div id="butterfly">🦋</div>

</div>

<!-- FINAL MEMORY -->
<div id="photoContainer">
  <img id="photo" src="Screenshot_2026-04-02-12-47-16-582_com.miui.gallery.jpg">
  <div id="caption">
    Istanbul and me both of us had the best days when you were here✨
  </div>
</div>

<script>

/* INTRO */
function startIntro(){
document.getElementById("introScreen").style.display="none";
document.getElementById("lock").style.display="flex";
}

/* PASSWORD */
let tries=0;

function check(){

let t=document.getElementById("passwordText");
let val=document.getElementById("password").value.toLowerCase();

if(val==="patricia"){

document.getElementById("lock").style.display="none";
document.getElementById("main").style.display="flex";

start();

}else{

tries++;

t.style.opacity=0;

setTimeout(()=>{

if(tries===1) t.innerHTML="Think about who makes this year shine the most...";
else if(tries===2) t.innerHTML="Someone who changed your world more than anything...";
else if(tries===3) t.innerHTML="You already have her name in your heart...";
else if(tries===4) t.innerHTML="Whose special day is today...";
else if(tries===5) t.innerHTML="The most beautiful name...";
else t.innerHTML="Say her name...";

t.style.opacity=1;

},300);

}

}

/* YOUR TEXTS */
const pages=[
["welcome",
"Did you know this year is the brightest year ever?",
"And do you know why?",
"This year is the brightest year ever because you are shining the most ever Patricia"],

["you must wonder what is this now, lean back; Think, watch, listen and enjoy"],

["Who are you?","I want you to think"],

["I don't know your answer however I am so proud of you"],

["what do you want?","I want you to focus"],

["By observing yourself that's the key"],

["what do you do?","Are you just a surgeon?",
"I want you to empty your mind and contemplate"],

["You are a lot of things. You are more than just a surgeon"],

["Now take a deep breath nice and smooth"],

["Ready for a journey? Buckle up!"],

["I love you birthday girl You are the most beautiful thing in the world❤"]
];

let i=0;

let text=document.getElementById("textMain");
let butterfly=document.getElementById("butterfly");
let music=document.getElementById("music");

function start(){
show();
}

function show(){

text.innerHTML="";
let lines=pages[i];
let j=0;

function next(){
if(j>=lines.length) return;
text.innerHTML+=lines[j]+"<br><br>";
j++;
setTimeout(next,1300);
}

next();

setTimeout(()=>{
butterfly.style.display="block";
},1500);

}

butterfly.onclick=function(){

if(i===9){
music.play();
i=10;
show();
return;
}

if(i===10){

document.getElementById("main").style.display="none";

let container=document.getElementById("photoContainer");
let photo=document.getElementById("photo");
let caption=document.getElementById("caption");

container.style.display="flex";

setTimeout(()=>{photo.style.opacity=1;},300);
setTimeout(()=>{photo.style.transform="scale(1.02)";},800);
setTimeout(()=>{caption.style.opacity=1;},1500);

return;
}

i++;
butterfly.style.display="none";
setTimeout(show,400);

};

</script>

</body>
</html>
