<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#f5f1dc;
  font-family:'Caveat', cursive;
  text-align:center;
}

.center{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
  padding:20px;
}

.text{
  font-size:26px;
  max-width:90%;
  line-height:1.8;
}

img{
  width:80%;
  max-width:360px;
  margin-top:20px;
  border-radius:16px;
}

#butterfly{
  font-size:40px;
  margin-top:20px;
  cursor:pointer;
  display:none;
}

.cursor{
  display:inline-block;
  width:2px;
  background:black;
  animation:blink 1s infinite;
}

@keyframes blink{ 50%{opacity:0;} }

.trail{
  position:fixed;
  width:3px;
  height:12px;
  background:rgba(0,0,0,0.25);
  border-radius:2px;
  pointer-events:none;
  animation:fade 1.2s linear forwards;
}

@keyframes fade{ to{opacity:0;} }
</style>
</head>

<body>

<div class="center">
  <div id="text" class="text"></div>
  <img id="image" style="display:none;">
  <div id="butterfly">🦋</div>
</div>

<audio id="music" src="Twilight.mp3"></audio>

<script>

const textEl = document.getElementById("text");
const img = document.getElementById("image");
const butterfly = document.getElementById("butterfly");

let i = 0;

/* ✍️ Writing */
function write(text, cb){
  textEl.innerHTML="";
  let cursor=document.createElement("span");
  cursor.className="cursor";
  textEl.appendChild(cursor);

  let index=0;

  function type(){
    if(index < text.length){

      let c=text[index];

      if(c=="\n"){
        textEl.insertBefore(document.createElement("br"),cursor);
      } else {
        let span=document.createElement("span");
        span.textContent=c;
        textEl.insertBefore(span,cursor);
      }

      index++;

      let delay = 70 + Math.random()*30;

      if(c==="." || c==="?" || c==="!"){
        delay += 300;
        textEl.insertBefore(document.createElement("br"),cursor);
      }

      setTimeout(type,delay);

    }else{
      cursor.remove();
      setTimeout(()=>{ butterfly.style.display="block"; },500);
      if(cb) cb();
    }
  }

  type();
}

/* 🦋 Trail */
function createTrail(){
  let rect = butterfly.getBoundingClientRect();
  let t=document.createElement("div");
  t.className="trail";
  t.style.left = rect.left + rect.width/2 + "px";
  t.style.top = rect.top + rect.height/2 + "px";
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),1200);
}

/* 🦋 Move */
function moveButterfly(callback){
  let interval=setInterval(createTrail,60);

  let dx=(Math.random()-0.5)*250;
  let dy=-250 - Math.random()*100;

  butterfly.animate([
    {transform:"translate(0,0)"},
    {transform:`translate(${dx}px,${dy}px)`}
  ],{duration:1200});

  setTimeout(()=>{
    clearInterval(interval);
    butterfly.style.transform="translate(0,0)";
    callback();
  },1200);
}

/* 🎵 Music */
function playMusic(){
  let m=document.getElementById("music");
  m.volume=0;
  m.play().catch(()=>{});
  let v=0;
  let fade=setInterval(()=>{
    if(v<0.7){v+=0.02;m.volume=v;}
    else clearInterval(fade);
  },200);
}
