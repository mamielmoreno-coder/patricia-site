<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patricia</title>

<!-- ✍️ HANDWRITTEN FONT -->
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #fdf6e3; /* paper feeling */
  color: #222;
  font-family: 'Caveat', cursive;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
  padding: 20px;
}

/* TEXT */
#text {
  font-size: 26px;
  max-width: 90%;
  line-height: 1.8;
  letter-spacing: 0.5px;
  transform: rotate(-1deg);
  text-shadow: 0px 1px 1px rgba(0,0,0,0.1);
  z-index: 2;
}

/* BUTTON */
#btn {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  padding: 14px 24px;
  font-size: 16px;
  background: #222;
  color: white;
  border: none;
  border-radius: 12px;
  opacity: 0;
  display: none;
  transition: opacity 2s ease;
  z-index: 2;
}

/* PHOTO */
#photo {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: scale(1);
  transition: transform 6s ease;
  display: none;
  z-index: 0;
}

/* CAPTION */
#caption {
  position: absolute;
  bottom: 100px;
  font-size: 22px;
  max-width: 90%;
  z-index: 2;
  display: none;
  color: white;
}
</style>
</head>

<body>

<audio id="music" src="Jamie-Duffy-Solas-Official-Video.mp3" loop></audio>

<img id="photo" src="Screenshot_2026-04-02-12-47-16-582_com.miui.gallery.jpg">

<div id="text">welcome</div>
<div id="caption">Istanbul and me both of us had the best days when you were here✨</div>
<button id="btn"></button>

<script>

const pages = [

"welcome",

"you must wonder what is this now,<br><br>lean back;<br><br>Think, watch, listen and enjoy",

"Who are you?<br><br>I want you to think",

"I don't know your answer however I am so proud of you",

"what do you want?<br><br>I want you to focus",

"By observing yourself that's the key",

"what do you do?<br><br>Are you just a surgeon?<br><br><br>I want you to empty your mind and contemplate",

"You are a lot of things.<br><br>You are more than just a surgeon",

"Now take a deep breath<br><br>nice and smooth",

"Ready for a journey?<br><br>Buckle up!",

"I love you birthday girl<br><br>You are the most beautiful thing in the world ❤",

""
];

let i = 0;

const text = document.getElementById("text");
const btn = document.getElementById("btn");
const photo = document.getElementById("photo");
const caption = document.getElementById("caption");

setTimeout(showButton, 2000);

btn.onclick = function() {

  if (i === 9) {
    document.getElementById("music").play();
  }

  i++;

  if (i >= pages.length) return;

  btn.style.opacity = 0;
  btn.style.display = "none";

  photo.style.display = "none";
  photo.style.transform = "scale(1)";
  caption.style.display = "none";

  if (i === 11) {

    text.innerHTML = "";

    photo.style.display = "block";
    caption.style.display = "block";

    setTimeout(() => {
      photo.style.transform = "scale(1.2)";
    }, 300);

    return;
  }

  text.innerHTML = pages[i];

  showButton();
};

function showButton() {

  setTimeout(() => {

    btn.style.display = "block";

    if (i === 9) {
      btn.innerHTML = "Explore and play";
    } else {
      btn.innerHTML = "Explore more";
    }

    setTimeout(() => {
      btn.style.opacity = 1;
    }, 100);

  }, 2000);
}

</script>

</body>
</html>
