<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patricia</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  overflow: hidden;
}

/* LOCK SCREEN */
#lockScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  z-index: 10;
  padding: 20px;
  transition: opacity 1.5s ease;
}

#lockText {
  font-size: 20px;
  max-width: 80%;
  line-height: 1.6;
}

#lockScreen input {
  margin-top: 20px;
  padding: 12px;
  font-size: 16px;
  text-align: center;
  border-radius: 8px;
  border: none;
}

#lockScreen button {
  margin-top: 15px;
  padding: 10px 20px;
}

#hint {
  margin-top: 15px;
  font-size: 14px;
  opacity: 0;
  transition: opacity 1s;
}

#magicButterfly {
  position: absolute;
  font-size: 40px;
  opacity: 0;
  transform: scale(0.5);
  transition: all 1.5s ease;
}

.magic-glow {
  background: radial-gradient(circle, rgba(255,255,255,0.15), black);
}

/* MAIN CONTENT */
#mainContent {
  display: none;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* TEXT */
#text {
  font-size: 22px;
  max-width: 90%;
  text-align: center;
  opacity: 0;
  transition: opacity 1.5s ease;
}

/* BUTTERFLY */
#butterfly {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  width: 70px;
  display: none;
  opacity: 0;
  transition: opacity 1.5s ease;
}

/* PHOTO */
#photo {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 85%;
  object-fit: cover;
}

#caption {
  display: none;
  position: fixed;
  bottom: 20px;
  width: 100%;
  text-align: center;
  font-size: 18px;
}
</style>
</head>

<body>

<!-- 🔐 LOCK SCREEN -->
<div id="lockScreen">

  <div id="lockText">
    Before you continue...
    <br><br>
    Think for a moment.
    <br><br>
    What is the one word that shines the most this year?
  </div>

  <input id="password" type="text" placeholder="enter it here..." />
  <button onclick="checkPassword()">Unlock</button>

  <div id="hint"></div>
  <div id="magicButterfly">🦋</div>

</div>

<!-- 🎬 MAIN -->
<div id="mainContent">

<audio id="music" src="music.mp3"></audio>

<img id="photo" src="photo.jpg">
<div id="caption">Istanbul and me both of us had the best days when you were here✨</div>

<div id="text"></div>
<img id="butterfly" src="butterfly.png">

</div>

<script>

/* PASSWORD SYSTEM */
let attempts = 0;

function checkPassword() {

  const input = document.getElementById("password").value.toLowerCase();
  const hint = document.getElementById("hint");
  const lock = document.getElementById("lockScreen");
  const butterfly = document.getElementById("magicButterfly");

  if (input === "patricia") {

    lock.classList.add("magic-glow");

    butterfly.style.opacity = 1;
    butterfly.style.transform = "scale(1.5)";

    setTimeout(() => {
      butterfly.style.transform = "scale(2)";
      butterfly.style.opacity = 0;
    }, 1200);

    setTimeout(() => {
      lock.style.opacity = 0;
    }, 1500);

    setTimeout(() => {
      lock.style.display = "none";
      document.getElementById("mainContent").style.display = "flex";
      startExperience();
    }, 2200);

  } else {

    attempts++;
    hint.style.opacity = 1;

    if (attempts === 1) hint.innerHTML = "Think about who makes this year shine the most...";
    else if (attempts === 2) hint.innerHTML = "Someone who changed your world more than anything...";
    else if (attempts === 3) hint.innerHTML = "You already have her name in your heart...";
    else if (attempts === 4) hint.innerHTML = "Whose special day is today...";
    else if (attempts === 5) hint.innerHTML = "The most beautiful name...";
    else hint.innerHTML = "Say her name...";
  }
}

/* EXPERIENCE */
const pages = [
["welcome...", "Did you know this year is the brightest year ever?", "And do you know why?", "This year is the brightest year ever", "because you are shining the most ever Patricia"],
["you must wonder what is this now,", "lean back;", "Think, watch, listen and enjoy"],
["Who are you?", "I want you to think"],
["I don't know your answer", "however I am so proud of you"],
["what do you want?", "I want you to focus"],
["By observing yourself", "that's the key"],
["what do you do?", "Are you just a surgeon?", "", "I want you to empty your mind and contemplate"],
["You are a lot of things.", "You are more than just a surgeon"],
["Now take a deep breath", "nice and smooth"],
["Ready for a journey?", "Buckle up!"],
["I love you birthday girl", "You are the most beautiful thing in the world ❤"]
];

let i = 0;

const text = document.getElementById("text");
const butterflyBtn = document.getElementById("butterfly");
const photo = document.getElementById("photo");
const caption = document.getElementById("caption");
const music = document.getElementById("music");

/* HEARTBEAT TEXT */
function showHeartbeat(lines) {

  text.style.opacity = 0;

  setTimeout(() => {
    text.innerHTML = "";
    text.style.opacity = 1;

    let index = 0;

    function nextLine() {
      if (index >= lines.length) return;
      text.innerHTML += lines[index] + "<br><br>";
      index++;
      setTimeout(nextLine, 1400);
    }

    nextLine();

  }, 400);
}

/* START */
function startExperience() {
  showHeartbeat(pages[0]);
  showButterfly();
}

function showButterfly() {
  setTimeout(() => {
    butterflyBtn.style.display = "block";
    butterflyBtn.style.opacity = 1;
  }, 2000);
}

/* CLICK */
butterflyBtn.onclick = function() {

  if (i === 9) {
    music.play();
    i = 10;
    showHeartbeat(pages[i]);
    return;
  }

  if (i === 10) {
    text.style.display = "none";
    butterflyBtn.style.display = "none";
    photo.style.display = "block";
    caption.style.display = "block";
    return;
  }

  i++;
  butterflyBtn.style.opacity = 0;

  setTimeout(() => {
    butterflyBtn.style.display = "none";
    showHeartbeat(pages[i]);
    showButterfly();
  }, 600);
};

</script>

</body>
</html>
