<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Caveat', cursive;
  text-align:center;
  background:#fdfaf3;
}

.center{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
  padding:20px;
}

.text{
  font-size:24px;
  max-width:90%;
  line-height:1.8;
  white-space:pre-line;
}

img{
  width:100%;
  max-height:50vh;
  object-fit:cover;
  margin-top:15px;
}

#butterfly{
  font-size:40px;
  margin-top:20px;
  cursor:pointer;
  display:none;
}

.cloud{
  position:fixed;
  bottom:-60px;
  right:-60px;
  width:260px;
  height:140px;
  background:rgba(255,255,255,0.85);
  border-radius:100px;
  opacity:0.5;
}

input{
  padding:12px;
  font-size:18px;
  background:black;
  color:white;
  border:none;
  border-radius:8px;
}

button{
  margin-top:10px;
  padding:10px 20px;
  background:black;
  color:white;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="center">
  <div id="text" class="text"></div>
  <img id="image" style="display:none;">
  <div id="butterfly">🦋</div>
</div>

<div class="cloud"></div>

<audio id="music" src="Twilight.mp3"></audio>

<script>

const textEl = document.getElementById("text");
const img = document.getElementById("image");
const butterfly = document.getElementById("butterfly");

let i = 0;
let attempts = 0;

const hints = [
"What do you think the password is?",
"You are close… think again.",
"Who is the most authentic person?",
"Whose special day is today?",
"Write the most beautiful name."
];

function showPassword(){
  textEl.innerHTML = "Please enter the password.<br><br>Take your time…<br>You already know it.";
  butterfly.style.display="none";

  let input = document.createElement("input");
  let btn = document.createElement("button");
  btn.innerText="Enter";

  textEl.appendChild(document.createElement("br"));
  textEl.appendChild(input);
  textEl.appendChild(btn);

  btn.onclick = ()=>{
    if(input.value.toLowerCase()==="patricia"){
      attempts = 0;
      i++;
      next();
    } else {
      let hint = hints[Math.min(attempts, hints.length-1)];
      attempts++;
      textEl.innerHTML = hint;

      setTimeout(()=>{
        showPassword();
      },1200);
    }
  };
}

/* FIXED TYPING (SPACING FIXED) */
function write(text){
  textEl.innerHTML = "";
  let index = 0;

  function type(){
    if(index < text.length){

      let char = text[index];

      if(char === "\n"){
        textEl.innerHTML += "<br>";
      } else {
        textEl.innerHTML += char;
      }

      index++;

      let delay = 90;
      if(".?!".includes(char)) delay += 250;

      setTimeout(type, delay);

    } else {
      setTimeout(()=>butterfly.style.display="block",1500);
    }
  }

  type();
}

/* MUSIC */
function playMusic(){
  let m = document.getElementById("music");
  m.currentTime = 0;
  m.volume = 0;
  m.play().then(()=>{
    let v=0;
    let fade=setInterval(()=>{
      if(v<0.7){v+=0.02;m.volume=v;}
      else clearInterval(fade);
    },200);
  });
}

/* RANDOM BUTTERFLY */
function moveButterfly(duration){

  let randomX = (Math.random() - 0.5) * 400; // left/right
  let randomY = -250 - Math.random()*100;    // upward

  butterfly.animate([
    {transform:"translate(0,0)",opacity:1},
    {transform:`translate(${randomX}px, ${randomY}px)`,opacity:0}
  ],{duration:duration});
}

const pages = [

{t:`Only open if you are alone… and if so click the butterfly`, password:true},

{t:`Welcome birthday girl ❤️`},

{t:`You must wonder… what is this now?

Well… you don’t know.

Do we really have to have answers for everything?

Right now, you would probably say… of course not.

Yes, Patricia… life has another kind of beauty when we don’t have answers for some things.

I know you like not having all the answers.

I know my woman.

Now… lean back.

Think.

Watch.

Listen.

And enjoy.`},

{t:`I'm thinking about you, Patricia. What a lovely thing you are. I never get tired of thinking about you. A lot, a lot has happened in my life, which changed and structured me. Life, of course, is interesting. How could I guess you would show up from paradise in the most unexpected way and make me fall in love with you?`},

{t:`Did you know that this year is the brightest year? And do you know why? This year is the brightest year because you are shining the most.`},

{t:`Who are you? I want you to think.`},

{t:`I don't know what your answer is, however, I will tell you with my own words who are you. In my eyes, you are the light that passes by the universe. You are the soul that surrounds the whole world with peace and calmness. You are the moment that touched a lot of souls. You are the real success. You are my natural dopamine.`},

{t:`What do you want?

I want you to really focus.`},

{t:`A profound question…

How can one know what they truly want?

Of course… by observing themselves.

But we don’t always have that ability.

Even when we do observe, we tend to observe others.

Rarely do we observe ourselves.

The key is to hear your inner voice… and follow it.

Observe yourself.

Explore yourself.

Listen to yourself.

Be as bold as the decision you made to come to Istanbul without even knowing if I was tall or not :)

You are more than what you think.

You don’t have limits.

You are just like a butterfly… flying freely in the sky.`, long:true},

{t:`What do you do?

Are you just a pediatric surgeon?

I want you to empty your mind… and truly contemplate this.`},

{t:`You are many things.

You are more than just a pediatric surgeon.`},

{t:`Now, take a deep breath… nice and smooth.`},

{t:`Ready for a journey?

For a better experience, put your headphones on.`, music:true},

{t:`You are the most special thing to me.`},

{t:`Look at yourself… how noble you are.`, img:"Patricia-and-horse.jpg"},

{t:`Istanbul and I had our best days when you were here.`, img:"patricia1.jpg"},

{t:`The first time I saw you with glasses…`, img:"Patricia-glasses.jpg"},

{t:`As I told you before…`, img:"Patricia-pure.jpg"},

{t:`The very first photo you ever sent me…`, img:"Patricia-tongue-stickout.jpg"},

{t:`You look so happy here.`, img:"patricia-kid.jpg"},

{t:`Do you remember that beautiful moment…`, img:"sunset.jpg"},

{t:`Don’t we look so cute together?`, img:"Patricia-me.jpg"},

{t:`Los niños se alimentan del presente…`},

{t:`Que vueles tan libre como las mariposas.`},

{t:``, final:true}

];

function next(){

  img.style.display="none";
  butterfly.style.display="none";

  let p = pages[i];

  write(p.t);

  if(p.password){
    butterfly.onclick = showPassword;
    return;
  }

  if(p.img){
    setTimeout(()=>{
      img.src = p.img;
      img.style.display="block";
    },1000);
  }

  butterfly.onclick = ()=>{

    if(p.music) playMusic();

    if(p.final){
      textEl.innerHTML = "❤️<br>Te amo<br><br>Feliz cumpleaños Patricia";
      return;
    }

    moveButterfly(p.long ? 5000 : 1200);

    setTimeout(()=>{
      i++;
      next();
    }, p.long ? 5000 : 1200);
  };
}

next();

</script>

</body>
</html>
