<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patricia</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
  color: white;
}

/* BACKGROUND */
#bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  opacity: 0;
  transition: opacity 2s ease, transform 10s ease;
  transform: scale(1);
}

/* DARK OVERLAY */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

/* TEXT */
#text {
  position: absolute;
  bottom: 15%;
  width: 100%;
  text-align: center;
  font-size: 22px;
  opacity: 0;
  transition: opacity 2s;
  padding: 0 20px;
}

/* VIDEO */
#video {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
}

.show {
  opacity: 1;
}
</style>
</head>

<body>

<div id="bg"></div>
<div class="overlay"></div>
<div id="text"></div>

<video id="video" src="final.mp4"></video>

<audio id="music" loop>
  <source src="piano.mp3">
</audio>

<script>

const scenes = [

  /* AIRPORT */
  {
    bg: "airport.jpg",
    texts: [
      "I remember waiting for you…",
      "I was just hoping I would recognize you instantly.",
      "And I did."
    ]
  },

  {
    bg: "airport.jpg",
    texts: [
      "That first hug…",
      "didn’t feel like the first at all."
    ]
  },

  /* FERRY */
  {
    bg: "ferry.jpg",
    texts: [
      ""
    ]
  },

  {
    bg: "ferry.jpg",
    texts: [
      "Your hands were cold…",
      "I just wanted to warm them."
    ]
  },

  {
    bg: "ferry.jpg",
    texts: [
      "I didn’t want that moment to end."
    ]
  },

  /* FINAL */
  {
    bg: "black",
    texts: [
      "Some moments stay.",
      "You are one of them."
    ]
  }

];

let sceneIndex = 0;
let textIndex = 0;

const bg = document.getElementById("bg");
const text = document.getElementById("text");
const music = document.getElementById("music");
const video = document.getElementById("video");

/* START AUTOMATICALLY */
setTimeout(() => {
  music.play();
  nextScene();
}, 2000);

function nextScene() {

  if (sceneIndex >= scenes.length) {
    showFinalVideo();
    return;
  }

  const scene = scenes[sceneIndex];

  bg.style.opacity = 0;

  setTimeout(() => {

    if (scene.bg === "black") {
      bg.style.backgroundImage = "none";
      bg.style.backgroundColor = "black";
    } else {
      bg.style.backgroundImage = `url(${scene.bg})`;
    }

    bg.style.opacity = 1;
    bg.style.transform = "scale(1.05)";

    textIndex = 0;
    showText(scene);

  }, 1500);

}

function showText(scene) {

  if (textIndex >= scene.texts.length) {
    sceneIndex++;
    setTimeout(nextScene, 3000);
    return;
  }

  text.classList.remove("show");

  setTimeout(() => {
    text.innerHTML = scene.texts[textIndex];
    text.classList.add("show");
    textIndex++;
  }, 1000);

  setTimeout(() => {
    showText(scene);
  }, 4000);

}

function showFinalVideo() {
  text.classList.remove("show");

  setTimeout(() => {
    video.style.display = "block";
    video.play();
  }, 2000);
}

</script>

</body>
</html>
