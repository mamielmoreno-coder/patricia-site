<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Patricia ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: linear-gradient(#ff7e5f, #feb47b);
  transition: background 5s ease;
  color: white;
}

/* 🌅 Sunset to night */
.night {
  background: linear-gradient(#020111, #191621);
}

/* ✨ particles */
canvas {
  position: absolute;
  top: 0;
  left: 0;
}

/* 🦋 butterfly */
.butterfly {
  position: absolute;
  width: 70px;
  animation: float 8s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translate(10vw,60vh); }
  50% { transform: translate(70vw,30vh); }
}

/* 💬 text */
.container {
  position: absolute;
  width: 100%;
  top: 50%;
  transform: translateY(-50%);
  text-align: center;
}

h1 {
  font-size: 2.5rem;
}

#text {
  margin-top: 20px;
  font-size: 1.2rem;
  min-height: 40px;
}

/* ❤️ button */
button {
  margin-top: 30px;
  padding: 12px 25px;
  border-radius: 25px;
  border: none;
  background: white;
  color: black;
  cursor: pointer;
  font-size: 1rem;
}

button:hover {
  background: #ff4d6d;
  color: white;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<img class="butterfly" src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Butterfly_icon.svg/1024px-Butterfly_icon.svg.png">

<div class="container">
  <h1>Patricia…</h1>
  <div id="text"></div>
  <button onclick="start()">Start</button>
</div>

<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>
/* ✨ particles */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<100;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    dx: (Math.random()-0.5),
    dy: (Math.random()-0.5)
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.x+=p.dx;
    p.y+=p.dy;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
  });
  requestAnimationFrame(animate);
}
animate();

/* ⌨️ typing effect */
const lines = [
"I didn't want to send you something normal…",
"Because you're not someone normal to me.",
"Somehow… you became a feeling.",
"And I can't really explain it…",
"But I know it's real."
];

let i=0, j=0;

function type(){
  if(i < lines.length){
    if(j < lines[i].length){
      document.getElementById("text").innerHTML += lines[i][j];
      j++;
      setTimeout(type, 40);
    } else {
      document.getElementById("text").innerHTML += "<br><br>";
      i++;
      j=0;
      setTimeout(type, 800);
    }
  }
}

/* 🚀 start */
function start(){
  document.body.classList.add("night");
  document.getElementById("music").play();
  document.getElementById("text").innerHTML = "";
  type();
}
</script>

</body>
</html>
