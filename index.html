<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Caveat', cursive;
  text-align:center;

  background:
    radial-gradient(circle at top left, rgba(0,0,0,0.05), transparent 40%),
    radial-gradient(circle at bottom right, rgba(0,0,0,0.06), transparent 50%),
    linear-gradient(#fdfaf3, #f6f1e6);

  background-image: radial-gradient(rgba(0,0,0,0.06) 1px, transparent 1px);
  background-size:18px 18px;
}

.center{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
  padding:20px;
}

.text{
  font-size:26px;
  max-width:90%;
  line-height:1.8;
}

img{
  width:100%;
  height:auto;
  margin-top:20px;
}

#butterfly{
  font-size:40px;
  margin-top:20px;
  cursor:pointer;
  display:none;
}

.cloud{
  position:fixed;
  bottom:-60px;
  right:-60px;
  width:260px;
  height:140px;
  background:rgba(255,255,255,0.85);
  border-radius:100px;
  box-shadow:
    60px 20px 0 0 rgba(255,255,255,0.85),
    120px 10px 0 0 rgba(255,255,255,0.85),
    30px -20px 0 0 rgba(255,255,255,0.85),
    90px -25px 0 0 rgba(255,255,255,0.85);
  filter:blur(2px);
  opacity:0.5;
}

input{
  padding:12px;
  font-size:18px;
  background:black;
  color:white;
  border:none;
  border-radius:8px;
  text-align:center;
}

button{
  margin-top:10px;
  padding:10px 20px;
  background:black;
  color:white;
  border:none;
  border-radius:8px;
}

.trail{
  position:fixed;
  width:3px;
  height:12px;
  background:rgba(0,0,0,0.25);
  border-radius:2px;
  animation:fade 1.2s linear forwards;
}

@keyframes fade{to{opacity:0;}}
</style>
</head>

<body>

<div class="center">
  <div id="text" class="text"></div>
  <img id="image" style="display:none;">
  <div id="butterfly">🦋</div>
</div>

<div class="cloud"></div>

<audio id="music" src="Twilight.mp3"></audio>

const textEl = document.getElementById("text");
const img = document.getElementById("image");
const butterfly = document.getElementById("butterfly");

let i = 0;

/* PASSWORD */
let attempts = 0;
const hints = [
"What do you think the password is?",
"You are close… think again.",
"Think about who you truly are…",
"Whose special day is today?",
"Write the most beautiful name…"
];

function showPassword(){
  textEl.innerHTML = "Please enter the password.<br><br>You already know it.";
  butterfly.style.display="none";

  let input = document.createElement("input");
  let btn = document.createElement("button");
  btn.innerText="Enter";

  textEl.appendChild(document.createElement("br"));
  textEl.appendChild(input);
  textEl.appendChild(btn);

  btn.onclick = ()=>{
    if(input.value.toLowerCase()==="patricia"){
      i++;
      next();
    } else {
      attempts++;
      textEl.innerHTML = hints[Math.min(attempts,hints.length-1)];
    }
  };
}

/* WRITING */
function write(text, cb){
  textEl.innerHTML="";
  let index=0;

  function type(){
    if(index < text.length){
      let c=text[index];
      textEl.innerHTML += (c=="\n") ? "<br>" : c;
      index++;

      let delay = 110 + Math.random()*40;
      if(".?!".includes(c)) delay += 300;

      setTimeout(type,delay);
    } else {
      setTimeout(()=>{ butterfly.style.display="block"; },2000);
      if(cb) cb();
    }
  }
  type();
}

/* TRAIL */
function createTrail(){
  let rect = butterfly.getBoundingClientRect();
  let t=document.createElement("div");
  t.className="trail";
  t.style.left = rect.left+"px";
  t.style.top = rect.top+"px";
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),1200);
}

/* MOVE */
function moveButterfly(callback, duration=1200){
  let interval=setInterval(createTrail,70);

  let dx=(Math.random()-0.5)*400;
  let dy=-300;

  butterfly.animate([
    {transform:"translate(0,0)",opacity:1},
    {transform:`translate(${dx}px,${dy}px)`,opacity:0}
  ],{duration:duration});

  setTimeout(()=>{
    clearInterval(interval);
    butterfly.style.opacity=0;
    setTimeout(()=>{
      butterfly.style.opacity=1;
      butterfly.style.transform="translate(0,0)";
      callback();
    },400);
  },duration);
}

/* MUSIC */
function playMusic(){
  let m=document.getElementById("music");
  m.currentTime = 0;
  m.volume = 0;

  m.play().then(()=>{
    let v = 0;
    let fade = setInterval(()=>{
      if(v < 0.7){
        v += 0.02;
        m.volume = v;
      } else clearInterval(fade);
    },200);
  }).catch(()=>{
    document.body.addEventListener("click", ()=>m.play(), {once:true});
  });
}
