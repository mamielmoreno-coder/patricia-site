<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Caveat', cursive;
  text-align:center;

  background-color:#fdfaf3;

  /* notebook dots */
  background-image:
    radial-gradient(rgba(0,0,0,0.08) 1px, transparent 1px);

  background-size:18px 18px;
}

.center{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
  padding:20px;
}

.text{
  font-size:26px;
  max-width:90%;
  line-height:1.8;
}

img{
  width:80%;
  max-width:360px;
  height:250px;
  object-fit:cover;
  margin-top:20px;
  border-radius:16px;
}

#butterfly{
  font-size:40px;
  margin-top:20px;
  cursor:pointer;
  display:none;
  opacity:1;
  transition:opacity 0.6s ease;
}

/* ☁️ CLOUD */
.cloud{
  position:fixed;
  bottom:-40px;
  right:-40px;
  width:220px;
  height:120px;
  background:#ffffff;
  border-radius:100px;
  box-shadow:
    60px 20px 0 0 #ffffff,
    120px 10px 0 0 #ffffff,
    30px -20px 0 0 #ffffff,
    90px -25px 0 0 #ffffff;

  opacity:0.6;
  filter:blur(1px);
  z-index:0;
}

.cursor{
  display:inline-block;
  width:2px;
  background:black;
  animation:blink 1s infinite;
}

@keyframes blink{50%{opacity:0;}}

.trail{
  position:fixed;
  width:3px;
  height:12px;
  background:rgba(0,0,0,0.25);
  border-radius:2px;
  pointer-events:none;
  animation:fade 1.4s linear forwards;
}

@keyframes fade{to{opacity:0;}}
</style>
</head>

<body>

<div class="center">
  <div id="text" class="text"></div>
  <img id="image" style="display:none;">
  <div id="butterfly">🦋</div>
</div>

<!-- ☁️ CLOUD ADDED -->
<div class="cloud"></div>

<audio id="music" src="Twilight.mp3"></audio>

<script>

/* (UNCHANGED JAVASCRIPT — EXACT SAME AS BEFORE) */

const textEl = document.getElementById("text");
const img = document.getElementById("image");
const butterfly = document.getElementById("butterfly");

let i = 0;

/* WRITING */
function write(text, cb){
  textEl.innerHTML="";
  let cursor=document.createElement("span");
  cursor.className="cursor";
  textEl.appendChild(cursor);

  let index=0;

  function type(){
    if(index < text.length){

      let c=text[index];

      if(c=="\n"){
        textEl.insertBefore(document.createElement("br"),cursor);
      } else {
        let span=document.createElement("span");
        span.textContent=c;
        textEl.insertBefore(span,cursor);
      }

      index++;

      let delay = 70 + Math.random()*30;

      if(c==="." || c==="?" || c==="!"){
        delay += 300;
        textEl.insertBefore(document.createElement("br"),cursor);
      }

      setTimeout(type,delay);

    }else{
      cursor.remove();
      setTimeout(()=>{ butterfly.style.display="block"; },500);
      if(cb) cb();
    }
  }

  type();
}

/* TRAIL */
function createTrail(){
  let rect = butterfly.getBoundingClientRect();
  let t=document.createElement("div");
  t.className="trail";
  t.style.left = rect.left + rect.width/2 + "px";
  t.style.top = rect.top + rect.height/2 + "px";
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),1400);
}

/* MOVE */
function moveButterfly(callback){

  let interval=setInterval(createTrail,70);

  let dx=(Math.random()-0.5)*250;
  let dy=-250 - Math.random()*120;

  butterfly.animate([
    {transform:"translate(0,0)", opacity:1},
    {transform:`translate(${dx}px,${dy}px)`, opacity:0}
  ],{duration:1200});

  setTimeout(()=>{
    clearInterval(interval);
    butterfly.style.opacity = 0;

    setTimeout(()=>{
      butterfly.style.opacity = 1;
      butterfly.style.transform="translate(0,0)";
      callback();
    },400);

  },1200);
}

/* MUSIC */
function playMusic(){
  let m = document.getElementById("music");
  m.volume = 0;
  let p = m.play();
  if(p){
    p.then(()=>{
      let v=0;
      let fade=setInterval(()=>{
        if(v<0.7){v+=0.02;m.volume=v;}
        else clearInterval(fade);
      },200);
    });
  }
}

/* EXPLOSION */
function releaseButterflies(){
  for(let i=0;i<30;i++){
    let b=document.createElement("div");
    b.textContent="🦋";
    b.style.position="fixed";
    b.style.left="50%";
    b.style.top="60%";
    document.body.appendChild(b);

    let dx=(Math.random()-0.5)*600;
    let dy=(Math.random()-0.5)*600;

    b.animate([
      {transform:"translate(0,0)",opacity:1},
      {transform:`translate(${dx}px,${dy}px)`,opacity:0}
    ],{duration:2500});

    setTimeout(()=>b.remove(),2500);
  }
}

/* PAGES (UNCHANGED) */
const pages = [
{t:"Only open if you are alone… and if so click the butterfly", password:true},
{t:"Welcome birthday girl ❤️"},
{t:"You must wonder what is this now. Wow, you don't know."},
{t:"I'm thinking about you, Patricia."}
];

function next(){
  img.style.display="none";
  butterfly.style.display="none";

  let p = pages[i];

  write(p.t,()=>{

    if(p.password){
      butterfly.onclick = showPassword;
      return;
    }

    butterfly.onclick=()=>{
      moveButterfly(()=>{
        i++;
        next();
      });
    };

  });
}

next();

</script>

</body>
</html>
