<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Caveat', cursive;
  color: #222;
  background: #f5f1dc;
  text-align: center;
}

/* CENTER */
.center {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* TEXT */
#introText, #passwordText, #textMain {
  font-size: 26px;
  max-width: 90%;
  white-space: pre-line;
  line-height: 1.6;
}

/* INPUT */
input {
  padding: 10px;
  font-size: 18px;
  margin-top: 15px;
  text-align: center;
}

button {
  margin-top: 15px;
  padding: 8px 20px;
}

/* BUTTERFLY */
#butterfly {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 40px;
  display: none;
  cursor: pointer;
}

/* ✅ FIXED FINAL MEMORY (ONLY PART CHANGED) */
#photoContainer {
  display: none; /* FIXED BUG */
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  background: #f5f1dc;

  flex-direction: column;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

#photo {
  width: 100%;
  height: 80vh; /* SAME STRUCTURE */
  object-fit: cover; /* FIXES BLACK SPACES */
}

#caption {
  height: 20vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  padding: 0 15px;
  text-align: center;
}

/* CURSOR */
.cursor {
  display: inline-block;
  width: 2px;
  background: #222;
  margin-left: 3px;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

/* INK EFFECT */
.letter {
  opacity: 0;
  animation: inkAppear 0.4s forwards;
}

@keyframes inkAppear {
  from { opacity: 0; filter: blur(2px); }
  to { opacity: 1; filter: blur(0); }
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="introScreen" class="center">
  <div id="introText"></div>
  <button onclick="startIntro()">Start</button>
</div>

<!-- PASSWORD -->
<div id="lock" class="center" style="display:none">
  <div id="passwordText"></div>
  <input id="password">
  <button onclick="check()">Enter</button>
</div>

<!-- MAIN -->
<div id="main" class="center" style="display:none">
<div id="textMain"></div>
<div id="butterfly">🦋</div>
</div>

<!-- FINAL -->
