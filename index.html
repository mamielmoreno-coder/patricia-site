<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #f5f1dc;
  font-family: 'Caveat', cursive;
  color: #222;
}

/* CENTER */
.center {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

/* TEXT */
#text, #textMain, #introText, #passwordText {
  font-size: 26px;
  max-width: 90%;
  line-height: 1.6;
  white-space: pre-line;
  min-height: 140px;
  opacity: 0;
}

/* FADE */
.textFade {
  opacity: 0;
}

.textFade.show {
  opacity: 1;
}

/* INPUT */
input {
  padding: 10px;
  font-size: 18px;
  margin-top: 15px;
  text-align: center;
  background: black;
  color: white;
  border: none;
}

button {
  margin-top: 10px;
  padding: 8px 20px;
  background: black;
  color: white;
  border: none;
}

/* 🦋 BUTTERFLY */
#butterfly {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  font-size: 40px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 2s ease, transform 2s ease;
}

#butterfly.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
  pointer-events: auto;
  cursor: pointer;
}

/* MEMORY */
#photoContainer {
  display: none;
  width: 100%;
  min-height: 100vh;
  background: #f5f1dc;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#photo {
  width: 90%;
  border-radius: 10px;
}

#caption {
  margin-top: 20px;
  font-size: 24px;
  text-align: center;
  padding: 0 20px;
}

/* CURSOR */
.cursor {
  display: inline-block;
  width: 2px;
  background: #222;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

/* ✨ STRONG GLOW + FLICKER */
.letterGlow {
  animation: glowFlicker 0.9s ease;
}

@keyframes glowFlicker {
  0% {
    text-shadow: 0 0 20px rgba(255,255,255,1),
                 0 0 35px rgba(255,220,150,1);
    opacity: 0.3;
  }
  30% {
    text-shadow: 0 0 12px rgba(255,255,255,0.8);
  }
  60% {
    text-shadow: 0 0 26px rgba(255,240,180,1);
  }
  100% {
    text-shadow: none;
    opacity: 1;
  }
}
</style>
</head>

<script>

/* MUSIC */
function fadeInMusic(){
  let music = document.getElementById("music");
  music.volume = 0;
  music.play().catch(()=>{});

  let vol = 0;
  let interval = setInterval(()=>{
    if(vol < 0.6){
      vol += 0.02;
      music.volume = vol;
    } else clearInterval(interval);
  },200);
}

/* WRITING ENGINE WITH ALL UPDATES */
function inkWrite(el, text, speed = 90, callback){

  el.innerHTML = "";
  el.classList.add("textFade");

  let cursor = document.createElement("span");
  cursor.className = "cursor";

  let emotionalWords = ["love","beautiful","you","special","heart"];
  let isEmotional = emotionalWords.some(w => text.toLowerCase().includes(w));
  let baseSpeed = isEmotional ? 120 : speed;

  let isIntro = text.includes("Only open if you are alone");

  let fadeTime = isIntro ? 1800 : 1200;
  let startDelay = isIntro ? 900 : 350;

  let i = 0;

  setTimeout(()=>{
    el.style.transition = `opacity ${fadeTime}ms ease`;
    el.classList.add("show");
  },50);

  setTimeout(()=>{

    el.appendChild(cursor);

    function type(){

      if(i < text.length){

        let char = text[i];

        if(char === "\n"){
          el.insertBefore(document.createElement("br"), cursor);
        } else {
          let span = document.createElement("span");
          span.textContent = char;
          span.classList.add("letterGlow");
          el.insertBefore(span, cursor);
        }

        i++;

        let pause = 0;
        if(char === ",") pause = isEmotional ? 200 : 120;
        else if(char === "." || char === "!" || char === "?") pause = isEmotional ? 500 : 300;
        else if(char === "\n") pause = isEmotional ? 600 : 400;

        setTimeout(type, baseSpeed + Math.random()*30 + pause);

      } else {
        cursor.remove();
        if(callback) callback();
      }
    }

    type();

  }, startDelay);
}
