<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #f5f1dc;
  font-family: 'Caveat', cursive;
  color: #222;
}

.center {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

.text {
  font-size: 26px;
  max-width: 90%;
  line-height: 1.6;
  min-height: 140px;
}

/* 🔥 FIRE EFFECT (around letters, not on them) */
.fireLetter {
  position: relative;
}

.fireLetter::after {
  content: "";
  position: absolute;
  left: -2px;
  top: -2px;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(255,140,0,0.25) 0%, transparent 70%);
  filter: blur(3px);
  opacity: 0;
  animation: glow 0.4s forwards;
}

@keyframes glow {
  0% { opacity: 0; }
  100% { opacity: 1; }
}

/* cursor */
.cursor {
  display: inline-block;
  width: 2px;
  background: #222;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

/* 🦋 butterfly */
#butterfly {
  font-size: 40px;
  margin-top: 20px;
  opacity: 0;
  cursor: pointer;
  transition: opacity 1.5s ease;
}

#butterfly.show {
  opacity: 1;
}

/* input */
input {
  padding: 10px;
  font-size: 18px;
  margin-top: 15px;
  text-align: center;
  background: black;
  color: white;
  border: none;
}

button {
  margin-top: 10px;
  padding: 8px 20px;
  background: black;
  color: white;
  border: none;
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1" class="center">
  <div id="text1" class="text"></div>
  <div id="butterfly">🦋</div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="center" style="display:none">
  <div id="hintText" class="text"></div>
  <input id="password">
  <button onclick="check()">Enter</button>
</div>

<!-- PAGE 3 -->
<div id="page3" class="center" style="display:none">
  <div id="text3" class="text"></div>
</div>

<script>

/* ✍️ handwriting */
function write(el, text, speed=70, callback){
  el.innerHTML = "";

  let cursor = document.createElement("span");
  cursor.className = "cursor";
  el.appendChild(cursor);

  let i = 0;

  function type(){
    if(i < text.length){

      let c = text[i];

      if(c === "\n"){
        el.insertBefore(document.createElement("br"), cursor);
      } else {
        let s = document.createElement("span");
        s.textContent = c;
        s.classList.add("fireLetter");
        el.insertBefore(s, cursor);
      }

      i++;
      setTimeout(type, speed + Math.random()*30);

    } else {
      cursor.remove();
      if(callback) callback();
    }
  }

  type();
}

/* PAGE 1 TEXT */
const intro = "Only open if you are alone…\n\nand if so\n\nclick the butterfly";

/* PAGE 3 TEXT */
const finalText = "I'm thinking about you, Patricia.\n\nWhat a lovely thing you are.\n\nI never get tired of thinking about you.\n\nA lot, a lot has happened in my life,\nwhich changed and structured me.\n\nLife, of course, is interesting.\n\nHow could I guess you would show up from paradise\nin the most unexpected way\nand make me fall in love with you?";

/* PASSWORD HINTS */
const hints = [
"What do you think the password is?",
"You are close, think again.",
"Who shines the most this year?",
"Whose special day is today?",
"Say her name"
];

let attempt = 0;

/* START */
window.onload = () => {
  write(document.getElementById("text1"), intro, 70, ()=>{
    document.getElementById("butterfly").classList.add("show");
  });
};

/* BUTTERFLY CLICK */
document.getElementById("butterfly").onclick = ()=>{
  document.getElementById("page1").style.display = "none";
  document.getElementById("page2").style.display = "flex";
  write(document.getElementById("hintText"), hints[0]);
};

/* PASSWORD CHECK */
function check(){
  let val = document.getElementById("password").value.toLowerCase();

  if(val === "patricia"){
    document.getElementById("page2").style.display = "none";
    document.getElementById("page3").style.display = "flex";
    write(document.getElementById("text3"), finalText);
  } else {
    attempt++;
    if(attempt >= hints.length) attempt = hints.length - 1;
    write(document.getElementById("hintText"), hints[attempt]);
  }
}

</script>

</body>
</html>
