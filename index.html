<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patricia</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
  color: white;
}

/* 🌅 background */
#bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  transition: opacity 2s ease;
  opacity: 0;
}

/* overlay */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

/* butterfly */
#butterfly {
  position: absolute;
  font-size: 40px;
  cursor: pointer;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: float 4s infinite ease-in-out;
}

@keyframes float {
  0%,100% { transform: translate(-50%, -50%) translateY(0); }
  50% { transform: translate(-50%, -50%) translateY(-20px); }
}

/* text */
#text {
  position: absolute;
  bottom: 15%;
  width: 100%;
  text-align: center;
  font-size: 22px;
  opacity: 0;
  transition: opacity 2s;
}

.show {
  opacity: 1;
}
</style>
</head>

<body>

<div id="bg"></div>
<div class="overlay"></div>

<div id="butterfly">🦋</div>
<div id="text"></div>

<audio id="music" loop>
  <source src="piano.mp3">
</audio>

<script>

const scenes = [
  {
    text: "There was something about that moment…",
    bg: "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"
  },
  {
    text: "When everything felt quiet… but full.",
    bg: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e"
  },
  {
    text: "Like time slowed down for a second.",
    bg: "https://images.unsplash.com/photo-1470770841072-f978cf4d019e"
  },
  {
    text: "And I didn’t want it to end.",
    bg: "https://images.unsplash.com/photo-1493244040629-496f6d136cc3"
  },
  {
    text: "You have that effect.",
    bg: "https://images.unsplash.com/photo-1501785888041-af3ef285b470"
  },
  {
    text: "You make moments stay.",
    bg: "https://images.unsplash.com/photo-1469474968028-56623f02e42e"
  },
  {
    text: "Even after they’re gone.",
    bg: "https://images.unsplash.com/photo-1506744038136-46273834b3fb"
  },
  {
    text: "And maybe that’s what makes you different.",
    bg: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e"
  },
  {
    text: "You feel like something rare.",
    bg: "https://images.unsplash.com/photo-1433086966358-54859d0ed716"
  },
  {
    text: "Feliz cumpleaños, Patricia ❤️",
    bg: "https://images.unsplash.com/photo-1500534623283-312aade485b7"
  }
];

let index = 0;

document.getElementById("butterfly").onclick = () => {
  document.getElementById("music").play();
  nextScene();
};

function nextScene() {

  if (index >= scenes.length) return;

  const bg = document.getElementById("bg");
  const text = document.getElementById("text");

  bg.style.opacity = 0;

  setTimeout(() => {
    bg.style.backgroundImage = `url(${scenes[index].bg})`;
    bg.style.opacity = 1;

    text.classList.remove("show");

    setTimeout(() => {
      text.innerHTML = scenes[index].text;
      text.classList.add("show");
    }, 800);

  }, 1000);

  index++;

  setTimeout(nextScene, 7000);
}
</script>

</body>
</html>
