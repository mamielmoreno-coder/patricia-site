<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Caveat', cursive;
  background: #f5f1dc;
  color: #222;
}

/* CENTER */
.center {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

/* TEXT */
#introText, #passwordText, #textMain {
  font-size: 26px;
  max-width: 90%;
  line-height: 1.6;
  white-space: pre-line;
}

/* INPUT */
input {
  padding: 10px;
  font-size: 18px;
  margin-top: 15px;
  text-align: center;
}

button {
  margin-top: 15px;
  padding: 8px 20px;
}

/* BUTTERFLY */
#butterfly {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 40px;
  display: none;
  cursor: pointer;
}

/* FINAL PAGE */
#photoContainer {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  background: #f5f1dc;
  flex-direction: column;
}

#photo {
  width: 100%;
  height: 75vh;
  object-fit: cover;
}

#caption {
  height: 25vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  padding: 0 15px;
  text-align: center;
}

/* CURSOR */
.cursor {
  display: inline-block;
  width: 2px;
  background: #222;
  margin-left: 3px;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="introScreen" class="center">
  <div id="introText"></div>
  <button onclick="startIntro()">Start</button>
</div>

<!-- PASSWORD -->
<div id="lock" class="center" style="display:none">
  <div id="passwordText"></div>
  <input id="password">
  <button onclick="check()">Enter</button>
</div>

<!-- MAIN -->
<div id="main" class="center" style="display:none">
  <div id="textMain"></div>
  <div id="butterfly">🦋</div>
</div>

<!-- FINAL -->
<div id="photoContainer">
  <img id="photo" src="Screenshot_2026-04-02-12-47-16-582_com.miui.gallery.jpg">
  <div id="caption">
    Istanbul and me both of us had the best days when you were here✨
  </div>
</div>

<!-- 🎧 WRITING SOUND -->
<audio id="writeSound" src="write.mp3" loop></audio>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" src="music.mp3"></audio>

<script>

/* TEXTS */
const introMessage = "Only open if you are alone…\n\nand if so\n\nclick start to explore";
const passwordMessage = "Think for a moment…\n\nWho shines the most this year?";

/* WRITING ENGINE */
function inkWrite(el, text, speed = 90) {

  el.innerHTML = "";

  let cursor = document.createElement("span");
  cursor.className = "cursor";
  el.appendChild(cursor);

  let sound = document.getElementById("writeSound");
  sound.volume = 0.15;
  sound.currentTime = 0;
  sound.play();

  let i = 0;

  function type() {

    if (i < text.length) {

      if (text[i] === "\n") {
        el.insertBefore(document.createElement("br"), cursor);
      } else {
        let span = document.createElement("span");
        span.textContent = text[i];
        el.insertBefore(span, cursor);
      }

      i++;
      setTimeout(type, speed);

    } else {
      cursor.remove();
      sound.pause();
    }
  }

  type();
}

/* 🎵 FADE-IN MUSIC FUNCTION */
function fadeInMusic() {
  let music = document.getElementById("bgMusic");
  music.volume = 0;
  music.play();

  let vol = 0;
  let interval = setInterval(() => {
    if (vol < 0.4) {
      vol += 0.02;
      music.volume = vol;
    } else {
      clearInterval(interval);
    }
  }, 200);
}

/* LOAD INTRO */
window.onload = () => {
  inkWrite(document.getElementById("introText"), introMessage);
};

/
