<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patricia</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Arial', sans-serif;
  color: white;
  background: black;
}

/* 🌅 SUNSET BACKGROUND */
.background {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(to top, #1a0f0a, #3a1f14, #ff7a3d, #ffd6a5);
  animation: breathe 20s infinite ease-in-out;
}

@keyframes breathe {
  0%,100% { filter: brightness(1); }
  50% { filter: brightness(1.2); }
}

/* ✨ PARTICLES */
.particle {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  opacity: 0.4;
  border-radius: 50%;
  animation: float linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-100vh); }
}

/* CENTER CONTENT */
.center {
  position: absolute;
  width: 100%;
  top: 40%;
  text-align: center;
  z-index: 10;
}

/* 🦋 BUTTERFLY */
.butterfly {
  font-size: 40px;
  cursor: pointer;
  animation: fly 3s infinite ease-in-out;
}

@keyframes fly {
  0% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
  100% { transform: translateY(0); }
}

/* 📸 PHOTO */
img {
  width: 600px;
  max-width: 80%;
  border-radius: 12px;
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
  transition: opacity 1.5s;
}

/* TEXT */
.text {
  margin-top: 20px;
  font-size: 20px;
  opacity: 0;
  transition: opacity 2s;
}

.show {
  opacity: 1;
}
</style>
</head>

<body>

<div class="background"></div>
<div id="particles"></div>

<div id="content" class="center">
  <p>This is not what you think.</p>
  <div class="butterfly" onclick="start()">🦋</div>
</div>

<script>

let step = 0;

const slides = [
  {
    img: "photo1.jpg",
    text: "Every moment has something that stays..."
  },
  {
    img: "photo2.jpg",
    text: "Even the quiet ones feel infinite..."
  },
  {
    img: "photo3.jpg",
    text: "Some memories don't leave..."
  }
];

function start() {
  nextSlide();
}

function nextSlide() {
  if (step >= slides.length) return;

  const content = document.getElementById("content");

  content.innerHTML = `
    <img id="photo" src="${slides[step].img}">
    <div class="text" id="text">${slides[step].text}</div>
  `;

  setTimeout(() => {
    document.getElementById("text").classList.add("show");
  }, 1000);

  step++;

  setTimeout(nextSlide, 6000);
}

/* PARTICLES */
for (let i = 0; i < 50; i++) {
  let p = document.createElement("div");
  p.className = "particle";
  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (8 + Math.random()*6) + "s";
  document.getElementById("particles").appendChild(p);
}

</script>

</body>
</html>
