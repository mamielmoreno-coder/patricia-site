<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #f5f1dc;
  font-family: 'Caveat', cursive;
  color: #222;
  overflow: hidden;
}

.center {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

.text {
  font-size: 26px;
  max-width: 90%;
  line-height: 1.6;
  min-height: 140px;
}

/* cursor */
.cursor {
  display: inline-block;
  width: 2px;
  background: #222;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

/* 🦋 butterfly */
#butterfly {
  font-size: 40px;
  margin-top: 20px;
  opacity: 0;
  cursor: pointer;
  transition: opacity 1.5s ease;
}

#butterfly.show {
  opacity: 1;
}

/* 🦋 TRAIL */
.trail {
  position: fixed;
  width: 3px;
  height: 10px;
  background: rgba(0,0,0,0.2);
  border-radius: 2px;
  pointer-events: none;
  animation: fadeTrail 0.7s linear forwards;
}

@keyframes fadeTrail {
  from { opacity: 0.5; }
  to { opacity: 0; }
}

/* input */
input {
  padding: 10px;
  font-size: 18px;
  margin-top: 15px;
  text-align: center;
  background: black;
  color: white;
  border: none;
}

button {
  margin-top: 10px;
  padding: 8px 20px;
  background: black;
  color: white;
  border: none;
}
</style>
</head>

<body>

<div id="page1" class="center">
  <div id="text1" class="text"></div>
  <div id="butterfly">🦋</div>
</div>

<div id="page2" class="center" style="display:none">
  <div id="hintText" class="text"></div>
  <input id="password">
  <button onclick="check()">Enter</button>
</div>

<div id="page3" class="center" style="display:none">
  <div id="text3" class="text"></div>
</div>

<script>

/* FULLSCREEN (hide GitHub UI as much as possible) */
document.documentElement.requestFullscreen?.();

/* ✍️ handwriting */
function write(el, text, baseSpeed=70, callback){

  el.innerHTML = "";

  let cursor = document.createElement("span");
  cursor.className = "cursor";
  el.appendChild(cursor);

  let i = 0;
  let speed = text.length > 120 ? 35 : baseSpeed;

  function type(){
    if(i < text.length){

      let c = text[i];

      if(c === "\n"){
        el.insertBefore(document.createElement("br"), cursor);
      } else {
        let s = document.createElement("span");
        s.textContent = c;
        el.insertBefore(s, cursor);
      }

      i++;

      let delay = speed + Math.random()*20;
      if(c === "." || c === ",") delay += 120;

      setTimeout(type, delay);

    } else {
      cursor.remove();
      if(callback) callback();
    }
  }

  type();
}

/* 🦋 RANDOM TRAIL */
function createTrail(x,y){
  let t = document.createElement("div");
  t.className = "trail";
  t.style.left = x + "px";
  t.style.top = y + "px";
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),700);
}

/* PAGE TEXT */
const intro = "Only open if you are alone… and if so click the butterfly";

const finalText = "I'm thinking about you, Patricia. What a lovely thing you are. I never get tired of thinking about you. A lot, a lot has happened in my life, which changed and structured me. Life, of course, is interesting. How could I guess you would show up from paradise in the most unexpected way and make me fall in love with you?";

const hints = [
"What do you think the password is?",
"You are close, think again.",
"Who shines the most this year?",
"Whose special day is today?",
"Write the most beautiful name"
];

let attempt = 0;

window.onload = ()=>{
  write(document.getElementById("text1"), intro, 70, ()=>{
    document.getElementById("butterfly").classList.add("show");
  });
};

/* 🦋 CLICK WITH RANDOM MOVEMENT */
document.getElementById("butterfly").onclick = ()=>{

  let b = document.getElementById("butterfly");
  let rect = b.getBoundingClientRect();

  let angle = Math.random() * 120 - 60; // random direction
  let distance = 200;

  let dx = Math.sin(angle * Math.PI/180) * distance;
  let dy = -Math.cos(angle * Math.PI/180) * distance;

  let steps = 12;
  let step = 0;

  let interval = setInterval(()=>{
    let x = rect.left + rect.width/2 + dx*(step/steps);
    let y = rect.top + dy*(step/steps);
    createTrail(x,y);
    step++;
    if(step > steps) clearInterval(interval);
  },40);

  b.style.transition = "transform 0.9s ease, opacity 0.9s";
  b.style.transform = `translate(${dx}px, ${dy}px)`;
  b.style.opacity = 0;

  setTimeout(()=>{
    document.getElementById("page1").style.display="none";
    document.getElementById("page2").style.display="flex";
    write(document.getElementById("hintText"), hints[0]);
  },900);
};

/* PASSWORD */
function check(){
  let val = document.getElementById("password").value.toLowerCase();

  if(val==="patricia"){
    document.getElementById("page2").style.display="none";
    document.getElementById("page3").style.display="flex";
    write(document.getElementById("text3"), finalText);
  } else {
    attempt++;
    if(attempt>=hints.length) attempt=hints.length-1;
    write(document.getElementById("hintText"), hints[attempt]);
  }
}

</script>

</body>
</html>
