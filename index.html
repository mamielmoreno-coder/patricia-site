<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patricia</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #fdf6e3;
  color: #222;
  font-family: 'Caveat', cursive;
  display: flex;
  flex-direction: column; /* 👈 IMPORTANT */
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  text-align: center;
  padding: 20px;
}

/* TEXT */
#text {
  font-size: 26px;
  max-width: 90%;
  line-height: 1.8;
  transform: rotate(-1deg);
  z-index: 2;
}

/* BUTTERFLY */
#butterfly {
  position: fixed;
  bottom: 50px;
  left: 50%;
  transform: translateX(-50%) scale(0.9);
  width: 85px;
  opacity: 0;
  display: none;
  animation: float 4s ease-in-out infinite;
  transition: opacity 2s ease, transform 1s ease;
  filter: drop-shadow(0 0 10px rgba(255,255,255,0.4));
  z-index: 3;
}

@keyframes float {
  0%, 100% { transform: translate(-50%, 0px) scale(0.9); }
  50% { transform: translate(-50%, -15px) scale(1); }
}

/* FLY AWAY */
@keyframes flyAway {
  0% { transform: translate(-50%, 0px) scale(1); opacity: 1; }
  100% { transform: translate(-50%, -300px) scale(0.6); opacity: 0; }
}

/* PHOTO (now normal flow) */
#photo {
  width: 100%;
  max-width: 500px;
  border-radius: 12px;
  margin-bottom: 10px;
  transform: scale(1);
  transition: transform 6s ease;
  display: none;
  z-index: 1;
}

/* CAPTION BELOW IMAGE */
#caption {
  margin-top: 10px;
  font-size: 22px;
  max-width: 90%;
  display: none;
  color: #222;
  z-index: 2;
}
</style>
</head>

<body>

<audio id="music" src="Jamie-Duffy-Solas-Official-Video.mp3" loop></audio>

<img id="photo" src="Screenshot_2026-04-02-12-47-16-582_com.miui.gallery.jpg">

<div id="text">welcome</div>
<div id="caption">Istanbul and me both of us had the best days when you were here✨</div>

<img id="butterfly" src="file_00000000914c720a8541e3890677c924.png">

<script>

const pages = [

"welcome",

"you must wonder what is this now,<br><br>lean back;<br><br>Think, watch, listen and enjoy",

"Who are you?<br><br>I want you to think",

"I don't know your answer however I am so proud of you",

"what do you want?<br><br>I want you to focus",

"By observing yourself that's the key",

"what do you do?<br><br>Are you just a surgeon?<br><br><br>I want you to empty your mind and contemplate",

"You are a lot of things.<br><br>You are more than just a surgeon",

"Now take a deep breath<br><br>nice and smooth",

"Ready for a journey?<br><br>Buckle up!",

"I love you birthday girl<br><br>You are the most beautiful thing in the world ❤",

""
];

let i = 0;

const text = document.getElementById("text");
const butterfly = document.getElementById("butterfly");
const photo = document.getElementById("photo");
const caption = document.getElementById("caption");

/* show butterfly */
setTimeout(showButterfly, 2000);

butterfly.onclick = function() {

  if (i === 9) {

    document.getElementById("music").play();

    butterfly.style.filter = "drop-shadow(0 0 25px rgba(255,255,255,0.9))";
    butterfly.style.animation = "flyAway 2.5s forwards";

    setTimeout(() => {
      nextPage();
    }, 2000);

    return;
  }

  nextPage();
};

function nextPage() {

  i++;

  if (i >= pages.length) return;

  butterfly.style.opacity = 0;
  butterfly.style.display = "none";

  photo.style.display = "none";
  photo.style.transform = "scale(1)";
  caption.style.display = "none";

  if (i === 11) {

    text.innerHTML = "";

    photo.style.display = "block";
    caption.style.display = "block";

    setTimeout(() => {
      photo.style.transform = "scale(1.1)";
    }, 300);

    return;
  }

  text.innerHTML = pages[i];

  showButterfly();
}

function showButterfly() {

  setTimeout(() => {

    butterfly.style.display = "block";

    setTimeout(() => {
      butterfly.style.opacity = 1;
    }, 100);

  }, 2000);
}

</script>

</body>
</html>
