<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  text-align:center;
  background:white;
}

.center{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

#butterfly{
  font-size:40px;
  cursor:pointer;
  opacity:0;
}
</style>
</head>

<body>

<div class="center">
  <div id="butterfly">🦋</div>
</div>

<script>
const butterfly = document.getElementById("butterfly");

let i = 0;
let attempts = 0;
let musicStarted = false;

const hints = [
  "Şifrenin ne olduğunu düşünüyorsun?",
  "Yaklaştın… tekrar düşün.",
  "En gerçek kişi kim?",
  "Bugün kimin özel günü?",
  "En güzel ismi yaz."
];

function showPassword(){
  document.body.innerHTML = `
    <div class="center">
      <div>Şifreyi girmen gerekiyor…</div>
      <input id="pass">
      <button onclick="checkPass()">Devam et</button>
      <div id="hint"></div>
    </div>
  `;
}

function checkPass(){
  let input = document.getElementById("pass").value.toLowerCase();
  let hintEl = document.getElementById("hint");

  if(input === "merve"){
    attempts = 0;
    i++;
    next();
  } else {
    hintEl.innerHTML = "<br>" + hints[Math.min(attempts, hints.length - 1)];
    attempts++;
  }
}

function moveButterfly(duration){
  butterfly.animate([
    {transform:"translate(0,0)", opacity:1},
    {transform:"translate(0,-300px)", opacity:0}
  ], {duration:duration});
}

function playMusic(){
  if(!musicStarted){
    let iframe = document.createElement("iframe");
    iframe.src = "https://www.youtube.com/embed/MhFbPNLwg0s?autoplay=1&loop=1&playlist=MhFbPNLwg0s&controls=0";
    iframe.style.width = "1px";
    iframe.style.height = "1px";
    iframe.style.opacity = "0";
    iframe.style.position = "fixed";
    iframe.style.left = "-9999px";
    document.body.appendChild(iframe);
    musicStarted = true;
  }
}

const pages = [
  {password:true},
  {},
  {},
  {},
  {},
  {},
  {},
  {},
  {},
  {},
  {},
  {},
  {music:true},
  {},
  {},
  {},
  {},
  {},
  {},
  {},
  {},
  {},
  {},
  {},
  {},
  {final:true}
];

function next(){
  butterfly.style.opacity = 1;

  let p = pages[i];

  if(p.password){
    butterfly.onclick = showPassword;
    return;
  }

  butterfly.onclick = () => {

    // click feedback (small scale effect)
    butterfly.style.transform = "scale(1.2)";
    setTimeout(() => butterfly.style.transform = "scale(1)", 200);

    if(p.music) playMusic();

    if(p.final){
      document.body.innerHTML = `
        <div class="center">
          ❤️
        </div>
      `;
      return;
    }

    moveButterfly(1200);

    setTimeout(() => {
      i++;
      next();
    }, 1200);
  };
}

next();
</script>

</body>
</html>
