<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #f5f1dc;
  font-family: 'Caveat', cursive;
  color: #222;
}

.center {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

#introText, #passwordText, #textMain {
  font-size: 26px;
  max-width: 90%;
  line-height: 1.6;
  min-height: 140px;
}

input {
  padding: 10px;
  font-size: 18px;
  margin-top: 15px;
  text-align: center;
  background: black;
  color: white;
  border: none;
}

button {
  margin-top: 10px;
  padding: 8px 20px;
  background: black;
  color: white;
  border: none;
}

#butterfly {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  font-size: 40px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 2s ease, transform 2s ease;
}

#butterfly.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
  pointer-events: auto;
}

/* 🦋 NATURAL FLIGHT PATH */
@keyframes butterflyFly {
  0% { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
  25% { transform: translateX(-40%) translateY(-60px) rotate(8deg); }
  50% { transform: translateX(-60%) translateY(-120px) rotate(-10deg); }
  75% { transform: translateX(-45%) translateY(-180px) rotate(6deg); }
  100% { transform: translateX(-55%) translateY(-260px) scale(0.9); opacity: 0; }
}

/* 🦋 WING FLAP */
@keyframes wingFlap {
  0% { transform: rotate(0deg); }
  25% { transform: rotate(12deg); }
  50% { transform: rotate(-12deg); }
  75% { transform: rotate(8deg); }
  100% { transform: rotate(0deg); }
}

#butterfly.fly {
  animation:
    butterflyFly 0.9s ease forwards,
    wingFlap 0.25s ease-in-out infinite;
}

#photoContainer {
  display: none;
  width: 100%;
  height: 100vh;
  background: #f5f1dc;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

#photo {
  width: 90%;
  border-radius: 10px;
}

#caption {
  margin-top: 20px;
  font-size: 24px;
}

.cursor {
  display: inline-block;
  width: 2px;
  background: #222;
  animation: blink 1s infinite;
}

@keyframes blink { 50% { opacity: 0; } }

.letterGlow {
  animation: glow 0.8s ease;
}

@keyframes glow {
  0% { text-shadow: 0 0 20px white, 0 0 35px #ffdca0; opacity: 0.3; }
  50% { text-shadow: 0 0 25px #fff0b0; }
  100% { text-shadow: none; opacity: 1; }
}
</style>
</head>

<body>

<div id="introScreen" class="center">
  <div id="introText"></div>
  <button onclick="startIntro()">Start</button>
</div>

<div id="lock" class="center" style="display:none">
  <div id="passwordText"></div>
  <input id="password">
  <button onclick="check()">Enter</button>
</div>

<div id="main" class="center" style="display:none">
  <div id="textMain"></div>
  <div id="butterfly">🦋</div>
</div>

<div id="photoContainer">
  <img id="photo" src="Screenshot_2026-04-02-12-47-16-582_com.miui.gallery.jpg">
  <div id="caption">Istanbul and me both of us had the best days when you were here✨</div>
</div>

<audio id="music" src="Jamie-Duffy-Solas-Official-Video.mp3"></audio>

<script>

function fadeInMusic(){
  let m = document.getElementById("music");
  m.volume = 0;
  m.play().catch(()=>{});
  let v = 0;
  let i = setInterval(()=>{
    if(v < 0.6){ v += 0.02; m.volume = v; }
    else clearInterval(i);
  },200);
}

function inkWrite(el, text, speed = 90, callback){
  el.innerHTML = "";
  let cursor = document.createElement("span");
  cursor.className = "cursor";
  el.appendChild(cursor);

  let i = 0;

  function type(){
    if(i < text.length){
      let c = text[i];

      if(c === "\n"){
        el.insertBefore(document.createElement("br"), cursor);
      } else {
        let s = document.createElement("span");
        s.textContent = c;
        s.classList.add("letterGlow");
        el.insertBefore(s, cursor);
      }

      i++;

      setTimeout(type, speed + Math.random()*30);
    } else {
      cursor.remove();
      if(callback) callback();
    }
  }

  type();
}

const introMessage = "Only open if you are alone…\n\nand if so\n\nclick start to explore";
const passwordMessage = "Think for a moment…\n\nWho shines the most this year?";

window.onload = ()=>{
  inkWrite(document.getElementById("introText"), introMessage);
};

function startIntro(){
  document.getElementById("introScreen").style.display="none";
  document.getElementById("lock").style.display="flex";
  inkWrite(document.getElementById("passwordText"), passwordMessage);
}

let tries=0;

function check(){
let val=document.getElementById("password").value.toLowerCase();
let t=document.getElementById("passwordText");

if(val==="patricia"){
  document.getElementById("lock").style.display="none";
  document.getElementById("main").style.display="flex";
  start();
  return;
}

tries++;

let msg="Think again...";
inkWrite(t,msg);
}

const pages=[
["welcome","Did you know this year is the brightest year ever?"],
["Ready for a journey? Buckle up!"],
["I love you birthday girl ❤"]
];

let i=0;
let text=document.getElementById("textMain");
let butterfly=document.getElementById("butterfly");

function start(){ show(); }

function show(){
let full=pages[i].join("\n\n");

inkWrite(text, full, 90, ()=>{
  butterfly.classList.add("show");
  butterfly.style.pointerEvents="auto";
});
}

butterfly.onclick=()=>{

if(i===1) fadeInMusic();

if(i===2){
  document.getElementById("main").style.display="none";
  document.getElementById("photoContainer").style.display="flex";
  return;
}

i++;

butterfly.style.pointerEvents="none";

/* 🦋 FLY */
butterfly.classList.add("fly");

setTimeout(()=>{
  butterfly.classList.remove("fly");
  butterfly.classList.remove("show");
  show();
},900);

};

</script>

</body>
</html>
