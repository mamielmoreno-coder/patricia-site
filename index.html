<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Caveat', cursive;
  text-align:center;

  background:
    radial-gradient(circle at top left, rgba(0,0,0,0.05), transparent 40%),
    radial-gradient(circle at bottom right, rgba(0,0,0,0.06), transparent 50%),
    linear-gradient(#fdfaf3, #f6f1e6);

  background-image:
    radial-gradient(rgba(0,0,0,0.06) 1px, transparent 1px);

  background-size:18px 18px;
}

.center{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
  padding:20px;
}

.text{
  font-size:26px;
  max-width:90%;
  line-height:1.8;
}

img{
  width:100%;
  height:auto;
  object-fit:cover;
  margin-top:20px;
}

#butterfly{
  font-size:40px;
  margin-top:20px;
  cursor:pointer;
  display:none;
}

.cloud{
  position:fixed;
  bottom:-60px;
  right:-60px;
  width:260px;
  height:140px;
  background:rgba(255,255,255,0.85);
  border-radius:100px;
  box-shadow:
    60px 20px 0 0 rgba(255,255,255,0.85),
    120px 10px 0 0 rgba(255,255,255,0.85),
    30px -20px 0 0 rgba(255,255,255,0.85),
    90px -25px 0 0 rgba(255,255,255,0.85);
  filter:blur(2px);
  opacity:0.5;
}

.trail{
  position:fixed;
  width:3px;
  height:12px;
  background:rgba(0,0,0,0.25);
  border-radius:2px;
  animation:fade 1.2s linear forwards;
}

@keyframes fade{to{opacity:0;}}
</style>
</head>

<body>

<div class="center">
  <div id="text" class="text"></div>
  <img id="image" style="display:none;">
  <div id="butterfly">🦋</div>
</div>

<div class="cloud"></div>

<audio id="music" src="Twilight.mp3"></audio>

<script>

const textEl = document.getElementById("text");
const img = document.getElementById("image");
const butterfly = document.getElementById("butterfly");

let i = 0;

/* PASSWORD */
let attempts = 0;
const hints = [
"What do you think the password is?",
"You are close… think again.",
"Who is the most authentic person?",
"Whose special day is today?",
"Write the most beautiful name."
];

function showPassword(){
  textEl.innerHTML = "Please enter the password.";
  butterfly.style.display = "none";

  let input = document.createElement("input");
  let btn = document.createElement("button");

  btn.innerText = "Enter";

  textEl.appendChild(document.createElement("br"));
  textEl.appendChild(input);
  textEl.appendChild(btn);

  btn.onclick = () => {
    if(input.value.toLowerCase() === "patricia"){
      i++;
      next();
    } else {
      attempts++;
      textEl.innerHTML = hints[Math.min(attempts, hints.length-1)];
    }
  };
}

/* WRITING */
function write(text, cb){
  textEl.innerHTML="";
  let index=0;

  function type(){
    if(index < text.length){

      let c=text[index];

      if(c=="\n"){
        textEl.innerHTML += "<br>";
      } else {
        textEl.innerHTML += c;
      }

      index++;

      let delay = 110 + Math.random()*40;

      if(c==="." || c==="?" || c==="!"){
        delay += 300;
        textEl.innerHTML += "<br>";
      }

      setTimeout(type,delay);

    }else{
      setTimeout(()=>{ butterfly.style.display="block"; },2000);
      if(cb) cb();
    }
  }

  type();
}

/* TRAIL */
function createTrail(){
  let rect = butterfly.getBoundingClientRect();
  let t=document.createElement("div");
  t.className="trail";
  t.style.left = rect.left + "px";
  t.style.top = rect.top + "px";
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),1200);
}

/* MOVE */
function moveButterfly(callback, duration = 1200){

  let interval=setInterval(createTrail,70);

  let dx=(Math.random()-0.5)*400;
  let dy=-300 - Math.random()*150;

  butterfly.animate([
    {transform:"translate(0,0)", opacity:1},
    {transform:`translate(${dx}px,${dy}px)`, opacity:0}
  ],{duration:duration});

  setTimeout(()=>{
    clearInterval(interval);
    butterfly.style.opacity = 0;

    setTimeout(()=>{
      butterfly.style.opacity = 1;
      butterfly.style.transform="translate(0,0)";
      callback();
    },400);

  },duration);
}

/* MUSIC */
function playMusic(){
  let m = document.getElementById("music");
  m.currentTime = 0;
  m.volume = 0;
  m.play().then(()=>{
    let v = 0;
    let fade = setInterval(()=>{
      if(v < 0.7){
        v += 0.02;
        m.volume = v;
      } else clearInterval(fade);
    },200);
  });
}

/* PAGES */
const pages = [

{t:`Only open if you are alone… and if so click the butterfly`, password:true},

{t:`Welcome birthday girl ❤️`},

{t:`You must wonder… what is this now?

Well… you don’t know.

Do we really have to have answers for everything?

Right now, you would probably say… of course not.

Yes, Patricia… life has another kind of beauty when we don’t have answers for some things.

I know you like not having all the answers.

I know my woman.

Now… lean back.

Think.

Watch.

Listen.

And enjoy.`},

{t:`I'm thinking about you, Patricia. What a lovely thing you are. I never get tired of thinking about you...`},

{t:`Did you know that this year is the brightest year?...`},

{t:`Who are you? I want you to think.`},

{t:`I don't know what your answer is...`},

{t:`What do you want?

I want you to really focus.`},

{t:`A profound question…

How can one know what they truly want?

Of course… by observing themselves...

You are just like a butterfly… flying freely in the sky.`, longFly:true},

{t:`What do you do?

Are you just a pediatric surgeon?

I want you to empty your mind… and truly contemplate this.`},

{t:`You are many things...`},

{t:`Now, take a deep breath… nice and smooth.`},

{t:`Ready for a journey?

For a better experience, put your headphones on.`, music:true},

{t:`You are the most special thing to me...`},

{t:`Look at yourself… how noble you are.`, img:"Patricia-and-horse.jpg"},

{t:`Istanbul and I had our best days...`, img:"patricia1.jpg"},

{t:`The first time I saw you with glasses…`, img:"Patricia-glasses.jpg"},

{t:`As I told you before...`, img:"Patricia-pure.jpg"},

{t:`The very first photo you ever sent me…`, img:"Patricia-tongue-stickout.jpg"},

{t:`You look so happy here.`, img:"patricia-kid.jpg"},

{t:`Do you remember that beautiful moment...`, img:"sunset.jpg"},

{t:`Don’t we look so cute together?`, img:"Patricia-me.jpg"},

{t:`Los niños se alimentan del presente…`},

{t:`Que vueles tan libre como las mariposas.`},

{t:``, final:true}

];

/* FLOW */
function next(){

  img.style.display="none";
  butterfly.style.display="none";

  let p = pages[i];

  write(p.t,()=>{

    if(p.password){
      butterfly.onclick = showPassword;
      return;
    }

    if(p.img){
      setTimeout(()=>{
        img.src=p.img;
        img.style.display="block";
      },1200);
    }

    butterfly.onclick=()=>{

      if(p.music) playMusic();

      if(p.final){
        textEl.innerHTML="❤️<br>Te amo<br><br>Feliz cumpleaños Patricia";
        return;
      }

      moveButterfly(()=>{
        i++;
        next();
      }, p.longFly ? 5000 : 1200);

    };

  });

}

next();

</script>

</body>
</html>
