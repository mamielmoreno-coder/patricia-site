<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Patricia</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* 🌅 BACKGROUND */
#bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  transition: opacity 1.5s ease;
}

/* DARK OVERLAY (cinematic) */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.35);
}

/* CENTER */
.center {
  position: absolute;
  width: 100%;
  bottom: 15%;
  text-align: center;
  z-index: 10;
}

/* 🦋 BUTTERFLIES */
.butterfly {
  font-size: 32px;
  margin: 8px;
  cursor: pointer;
  display: inline-block;
  transition: transform 0.3s;
}

.butterfly:hover {
  transform: scale(1.3);
}

/* MESSAGE */
#text {
  color: white;
  font-size: 20px;
  margin-top: 20px;
  opacity: 0;
  transition: opacity 2s;
  padding: 0 20px;
}

.show {
  opacity: 1;
}

/* START SCREEN */
#start {
  position: absolute;
  width: 100%;
  top: 40%;
  text-align: center;
  color: white;
  z-index: 20;
}

.start-btn {
  font-size: 40px;
  cursor: pointer;
  animation: float 2s infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
</style>
</head>

<body>

<div id="bg"></div>
<div class="overlay"></div>

<!-- START -->
<div id="start">
  <p>This is something for you…</p>
  <div class="start-btn" onclick="start()">🦋</div>
</div>

<!-- MAIN -->
<div id="content" class="center" style="display:none;">
  <div id="butterflies"></div>
  <div id="text"></div>
</div>

<!-- 🎹 MUSIC -->
<audio id="music" loop>
  <source src="piano.mp3" type="audio/mp3">
</audio>

<script>

const slides = [
  { text: "You feel like peace.", bg: "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" },
  { text: "You are something rare.", bg: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e" },
  { text: "Being with you feels different.", bg: "https://images.unsplash.com/photo-1470770841072-f978cf4d019e" },
  { text: "You make everything softer.", bg: "https://images.unsplash.com/photo-1493244040629-496f6d136cc3" },
  { text: "I remember moments with you, not just days.", bg: "https://images.unsplash.com/photo-1501785888041-af3ef285b470" },
  { text: "You have a calm I didn’t know I needed.", bg: "https://images.unsplash.com/photo-1469474968028-56623f02e42e" },
  { text: "Even silence feels full with you.", bg: "https://images.unsplash.com/photo-1506744038136-46273834b3fb" },
  { text: "There’s something about you I can’t explain.", bg: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e" },
  { text: "Some moments stay… and you are one of them.", bg: "https://images.unsplash.com/photo-1433086966358-54859d0ed716" },
  { text: "Feliz cumpleaños, Patricia ❤️", bg: "https://images.unsplash.com/photo-1500534623283-312aade485b7" }
];

let current = -1;

function start() {
  document.getElementById("start").style.display = "none";
  document.getElementById("content").style.display = "block";

  document.getElementById("music").play();

  const container = document.getElementById("butterflies");

  slides.forEach((_, i) => {
    const b = document.createElement("span");
    b.className = "butterfly";
    b.innerHTML = "🦋";
    b.onclick = () => showSlide(i);
    container.appendChild(b);
  });
}

function showSlide(i) {
  const bg = document.getElementById("bg");
  const text = document.getElementById("text");

  text.classList.remove("show");

  setTimeout(() => {
    bg.style.backgroundImage = `url(${slides[i].bg})`;
    text.innerHTML = slides[i].text;
    text.classList.add("show");
  }, 400);
}

</script>

</body>
</html>
