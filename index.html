<script>

const pages = [

"welcome",

"you must wonder what is this now,<br><br>lean back;<br><br>Think, watch, listen and enjoy",

"Who are you?<br><br>I want you to think",

"I don't know your answer however I am so proud of you",

"what do you want?<br><br>I want you to focus",

"By observing yourself that's the key",

"what do you do?<br><br>Are you just a surgeon?<br><br><br>I want you to empty your mind and contemplate",

"You are a lot of things.<br><br>You are more than just a surgeon",

"Now take a deep breath<br><br>nice and smooth",

"Ready for a journey?<br><br>Buckle up!",

"I love you birthday girl<br><br>You are the most beautiful thing in the world ❤"
];

let i = 0;

const text = document.getElementById("text");
const butterfly = document.getElementById("butterfly");
const photo = document.getElementById("photo");
const caption = document.getElementById("caption");
const music = document.getElementById("music");

/* show butterfly */
function showButterfly() {
  setTimeout(() => {
    butterfly.style.display = "block";
    butterfly.style.opacity = 1;
  }, 1500);
}

/* initial */
text.innerHTML = pages[0];
showButterfly();

butterfly.onclick = function () {

  /* PAGE 10 → SPECIAL */
  if (i === 9) {

    music.play();

    butterfly.style.animation = "flyAway 2.5s forwards";

    setTimeout(() => {

      i = 10;
      text.innerHTML = pages[10];

      butterfly.style.animation = "";
      butterfly.style.display = "none";
      butterfly.style.opacity = 0;

      showButterfly(); // new butterfly

    }, 2000);

    return;
  }

  /* PAGE 11 → FINAL PHOTO */
  if (i === 10) {

    butterfly.style.display = "none";
    text.innerHTML = "";

    photo.style.display = "block";
    caption.style.display = "block";

    setTimeout(() => {
      photo.style.transform = "scale(1.15)";
    }, 300);

    return;
  }

  /* NORMAL FLOW */
  i++;

  if (i >= pages.length) return;

  butterfly.style.display = "none";
  butterfly.style.opacity = 0;

  text.innerHTML = pages[i];

  showButterfly();
};

</script>
