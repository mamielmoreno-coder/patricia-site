<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#f5f1dc;
  font-family:'Caveat', cursive;
  text-align:center;
}

.center{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
  padding:20px;
}

.text{
  font-size:26px;
  max-width:90%;
  line-height:1.8;
}

/* IMAGE FIX */
img{
  width:80%;
  max-width:360px;
  height:250px;
  object-fit:cover;
  margin-top:20px;
  border-radius:16px;
}

/* BUTTERFLY */
#butterfly{
  font-size:40px;
  margin-top:20px;
  cursor:pointer;
  display:none;
  opacity:1;
  transition:opacity 0.6s ease;
}

/* PASSWORD INPUT */
input{
  padding:10px;
  font-size:18px;
  margin-top:15px;
  text-align:center;
  background:black;
  color:white;
  border:none;
}

button{
  margin-top:10px;
  padding:8px 20px;
  background:black;
  color:white;
  border:none;
}

.cursor{
  display:inline-block;
  width:2px;
  background:black;
  animation:blink 1s infinite;
}

@keyframes blink{50%{opacity:0;}}

/* TRAIL */
.trail{
  position:fixed;
  width:3px;
  height:12px;
  background:rgba(0,0,0,0.25);
  border-radius:2px;
  pointer-events:none;
  animation:fade 1.4s linear forwards;
}

@keyframes fade{to{opacity:0;}}
</style>
</head>

<body>

<!-- MAIN -->
<div id="main" class="center">
  <div id="text" class="text"></div>
  <img id="image" style="display:none;">
  <div id="butterfly">🦋</div>
</div>

<!-- PASSWORD SCREEN -->
<div id="lock" class="center" style="display:none">
  <div id="passwordText" class="text"></div>
  <input id="password">
  <button onclick="check()">Enter</button>
</div>

<audio id="music" src="Twilight.mp3"></audio>

<script>

const textEl = document.getElementById("text");
const img = document.getElementById("image");
const butterfly = document.getElementById("butterfly");

let i = 0;

/* PASSWORD HINTS */
let attempts = 0;
const hints = [
"What do you think the password is?",
"You are close, think again.",
"Who is the most authentic person?",
"Whose special day is today?",
"Write the most beautiful name."
];

/* WRITING */
function write(text, cb){
  textEl.innerHTML="";
  let cursor=document.createElement("span");
  cursor.className="cursor";
  textEl.appendChild(cursor);

  let index=0;

  function type(){
    if(index < text.length){

      let c=text[index];

      if(c=="\n"){
        textEl.insertBefore(document.createElement("br"),cursor);
      } else {
        let span=document.createElement("span");
        span.textContent=c;
        textEl.insertBefore(span,cursor);
      }

      index++;

      let delay = 70 + Math.random()*30;

      if(c==="." || c==="?" || c==="!"){
        delay += 300;
        textEl.insertBefore(document.createElement("br"),cursor);
      }

      setTimeout(type,delay);

    }else{
      cursor.remove();
      setTimeout(()=>{ butterfly.style.display="block"; },500);
      if(cb) cb();
    }
  }

  type();
}

/* PASSWORD FLOW */
function showPassword(){
  document.getElementById("main").style.display="none";
  document.getElementById("lock").style.display="flex";
  typePasswordHint();
}

function typePasswordHint(){
  let el = document.getElementById("passwordText");
  el.innerHTML="";
  let text = hints[Math.min(attempts, hints.length-1)];
  let i=0;

  function t(){
    if(i < text.length){
      el.innerHTML += text[i];
      i++;
      setTimeout(t,40);
    }
  }
  t();
}

function check(){
  let val = document.getElementById("password").value.toLowerCase();

  if(val === "patricia"){
    document.getElementById("lock").style.display="none";
    document.getElementById("main").style.display="flex";
    i = 1;
    next();
  } else {
    attempts++;
    typePasswordHint();
  }
}

/* TRAIL */
function createTrail(){
  let rect = butterfly.getBoundingClientRect();
  let t=document.createElement("div");
  t.className="trail";
  t.style.left = rect.left + rect.width/2 + "px";
  t.style.top = rect.top + rect.height/2 + "px";
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),1400);
}

/* MOVE */
function moveButterfly(callback){

  let interval=setInterval(createTrail,70);

  let dx=(Math.random()-0.5)*250;
  let dy=-250 - Math.random()*120;

  butterfly.animate([
    {transform:"translate(0,0)", opacity:1},
    {transform:`translate(${dx}px,${dy}px)`, opacity:0}
  ],{duration:1200});

  setTimeout(()=>{
    clearInterval(interval);
    butterfly.style.opacity = 0;

    setTimeout(()=>{
      butterfly.style.opacity = 1;
      butterfly.style.transform="translate(0,0)";
      callback();
    },400);

  },1200);
}

/* MUSIC */
function playMusic(){
  let m = document.getElementById("music");
  m.volume = 0;
  let p = m.play();
  if(p){
    p.then(()=>{
      let v=0;
      let fade=setInterval(()=>{
        if(v<0.7){v+=0.02;m.volume=v;}
        else clearInterval(fade);
      },200);
    });
  }
}

/* EXPLOSION */
function releaseButterflies(){
  for(let i=0;i<30;i++){
    let b=document.createElement("div");
    b.textContent="🦋";
    b.style.position="fixed";
    b.style.left="50%";
    b.style.top="60%";
    document.body.appendChild(b);

    let dx=(Math.random()-0.5)*600;
    let dy=(Math.random()-0.5)*600;

    b.animate([
      {transform:"translate(0,0)",opacity:1},
      {transform:`translate(${dx}px,${dy}px)`,opacity:0}
    ],{duration:2500});

    setTimeout(()=>b.remove(),2500);
  }
}

/* PAGES (UNCHANGED) */
const pages = [

{t:"Only open if you are alone… and if so click the butterfly", password:true},

{t:"Welcome birthday girl ❤️"},

{t:"You must wonder what is this now. Wow, you don't know. Do we have to have answers for everything? You must say now, of course not. Yes, Patricia, life has another beauty when we don't have answers for some things. I know you like not having all the answers. I know my woman. Now, lean back, think, watch, listen, and enjoy."},

{t:"I'm thinking about you, Patricia. What a lovely thing you are. I never get tired of thinking about you. A lot, a lot has happened in my life, which changed and structured me. Life, of course, is interesting. How could I guess you would show up from paradise in the most unexpected way and make me fall in love with you?"},

{t:"Did you know that this year is the brightest year? And do you know why? This year is the brightest year because you are shining the most."},

{t:"Who are you? I want you to think."},

{t:"I don't know what your answer is, however, I will tell you with my own words who are you. In my eyes, you are the light that passes by the universe. You are the soul that surrounds the whole world with peace and calmness. You are the moment that touched a lot of souls. You are the real success. You are my natural dopamine."},

{t:"What do you want? I want you to focus."},

{t:"A profound question. How can one know what exactly they want by observing themselves?"},

{t:"What do you do? Are you just a pediatric surgeon?"},

{t:"You are a lot of things. You are more than just a pediatric surgeon."},

{t:"Now, take a deep breath, nice and smooth."},

{t:"Ready for a journey? For a better experience, put your headphones on.", music:true},

{t:"You are the most special thing for me."},

{t:"Look at yourself.", img:"Patricia-and-horse.jpg"},

{t:"Istanbul memories.", img:"patricia1.jpg"},

{t:"Glasses.", img:"Patricia-glasses.jpg"},

{t:"Pure.", img:"Patricia-pure.jpg"},

{t:"Funny.", img:"Patricia-tongue-stickout.jpg"},

{t:"Happy.", img:"patricia-kid.jpg"},

{t:"Sunset.", img:"sunset.jpg"},

{t:"Together.", img:"Patricia-me.jpg"},

{t:"Los niños se alimentan del presente..."},

{t:"Que vueles tan libre como las mariposas.", final:true}

];

function next(){

  img.style.display="none";
  butterfly.style.display="none";

  let p = pages[i];

  write(p.t,()=>{

    if(p.password){
      butterfly.onclick = showPassword;
      return;
    }

    if(p.img){
      setTimeout(()=>{
        img.src=p.img;
        img.style.display="block";
      },1200);
    }

    butterfly.onclick=()=>{

      if(p.music) playMusic();

      if(p.final){
        releaseButterflies();
        setTimeout(()=>{
          textEl.innerHTML="❤️<br>Te amo<br><br>Feliz cumpleaños Patricia";
        },2500);
        return;
      }

      moveButterfly(()=>{
        i++;
        next();
      });

    };

  });

}

next();

</script>

</body>
</html>
