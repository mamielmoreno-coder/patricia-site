<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Patricia</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow: hidden;
  color: white;
}

/* 🌅 BACKGROUND IMAGE */
.background {
  position: fixed;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  transition: 1.5s ease;
}

/* CENTER */
.center {
  position: absolute;
  width: 100%;
  top: 40%;
  text-align: center;
}

/* BUTTERFLIES */
.butterfly {
  font-size: 35px;
  cursor: pointer;
  margin: 10px;
  transition: transform 0.3s;
}

.butterfly:hover {
  transform: scale(1.3);
}

/* MESSAGE */
.message {
  margin-top: 20px;
  font-size: 24px;
  opacity: 0;
  transition: opacity 1.5s;
}

.show {
  opacity: 1;
}
</style>
</head>

<body>

<div id="bg" class="background"></div>

<div id="content" class="center">

  <div id="butterflies">
    <!-- 10 butterflies -->
    <span class="butterfly" onclick="showSlide(0)">🦋</span>
    <span class="butterfly" onclick="showSlide(1)">🦋</span>
    <span class="butterfly" onclick="showSlide(2)">🦋</span>
    <span class="butterfly" onclick="showSlide(3)">🦋</span>
    <span class="butterfly" onclick="showSlide(4)">🦋</span>
    <span class="butterfly" onclick="showSlide(5)">🦋</span>
    <span class="butterfly" onclick="showSlide(6)">🦋</span>
    <span class="butterfly" onclick="showSlide(7)">🦋</span>
    <span class="butterfly" onclick="showSlide(8)">🦋</span>
    <span class="butterfly" onclick="showSlide(9)">🦋</span>
  </div>

  <div id="message" class="message"></div>

</div>

<!-- 🎹 BACKGROUND MUSIC -->
<audio id="music" autoplay loop>
  <source src="piano.mp3" type="audio/mp3">
</audio>

<script>

const slides = [
  {
    text: "You are the most beautiful soul I’ve ever met.",
    bg: "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"
  },
  {
    text: "You bring calm into everything around you.",
    bg: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e"
  },
  {
    text: "Every moment with you feels different.",
    bg: "https://images.unsplash.com/photo-1470770841072-f978cf4d019e"
  },
  {
    text: "You have a light that stays with me.",
    bg: "https://images.unsplash.com/photo-1493244040629-496f6d136cc3"
  },
  {
    text: "Even silence feels beautiful with you.",
    bg: "https://images.unsplash.com/photo-1501785888041-af3ef285b470"
  },
  {
    text: "You make everything feel softer.",
    bg: "https://images.unsplash.com/photo-1469474968028-56623f02e42e"
  },
  {
    text: "There’s something special about you I can’t explain.",
    bg: "https://images.unsplash.com/photo-1506744038136-46273834b3fb"
  },
  {
    text: "You feel like peace.",
    bg: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e"
  },
  {
    text: "I could stay in those moments forever.",
    bg: "https://images.unsplash.com/photo-1433086966358-54859d0ed716"
  },
  {
    text: "Feliz cumpleaños, Patricia ❤️",
    bg: "https://images.unsplash.com/photo-1500534623283-312aade485b7"
  }
];

function showSlide(index) {
  const bg = document.getElementById("bg");
  const msg = document.getElementById("message");

  bg.style.backgroundImage = `url(${slides[index].bg})`;

  msg.classList.remove("show");

  setTimeout(() => {
    msg.innerHTML = slides[index].text;
    msg.classList.add("show");
  }, 500);
}

</script>

</body>
</html>
