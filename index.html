<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patricia</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

#text {
  font-size: 20px;
  padding: 20px;
}

#playBtn {
  margin-top: 20px;
  padding: 12px 20px;
  font-size: 16px;
  background: white;
  color: black;
  border: none;
  border-radius: 8px;
}
</style>
</head>

<body>

<!-- 🎹 MUSIC -->
<audio id="music" src="Jamie-Duffy-Solas-Official.mp3" loop></audio>

<!-- YOUR TEXT -->
<div id="text">
  Life has more meaning with you...<br><br>
  I have loved anyone as much as I have loved you.<br><br>
  I have never wanted to do so many things with anyone as much as I want with you.<br><br>
  Your love is unmatched and your care can't be surpassed...<br><br>
  you don't know how lovely you are Patricia ♥
</div>

<!-- BUTTON -->
<button id="playBtn">Tap to play</button>

<script>
document.getElementById("playBtn").onclick = function() {
  document.getElementById("music").play();
  this.style.display = "none";
};
</script>

</body>
</html>
