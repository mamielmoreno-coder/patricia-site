<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patricia</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  overflow: hidden;
}

/* background */
#bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  opacity: 0;
  transition: opacity 2s ease, transform 8s ease;
  transform: scale(1);
}

/* overlay */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

/* text */
#text {
  position: absolute;
  bottom: 20%;
  width: 100%;
  text-align: center;
  font-size: 22px;
  opacity: 0;
  transition: opacity 2s;
  padding: 0 20px;
}

/* video */
#video {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
}

.show {
  opacity: 1;
}
</style>
</head>

<body>

<div id="bg"></div>
<div class="overlay"></div>
<div id="text"></div>

<video id="video" src="final.mp4"></video>

<audio id="music">
  <source src="piano.mp3">
</audio>

<script>

const timeline = [

  {
    bg: "https://images.unsplash.com/photo-1436491865332-7a61a109cc05",
    lines: [
      "",
      "I remember waiting for you…",
      "I didn’t know if I would recognize you instantly."
    ]
  },

  {
    bg: "https://images.unsplash.com/photo-1436491865332-7a61a109cc05",
    lines: [
      "But I did.",
      "",
      "And that first hug…",
      "didn’t feel like the first at all."
    ]
  },

  {
    bg: "https://images.unsplash.com/photo-1500375592092-40eb2168fd21",
    lines: [
      "",
      "",
      "That moment… on the ferry."
    ]
  },

  {
    bg: "https://images.unsplash.com/photo-1500375592092-40eb2168fd21",
    lines: [
      "Your hands were cold…",
      "",
      "I just wanted to stay there a little longer."
    ]
  },

  {
    bg: "black",
    lines: [
      "",
      "Some moments stay.",
      "You are one of them."
    ]
  }

];

let scene = 0;
let line = 0;

const bg = document.getElementById("bg");
const text = document.getElementById("text");
const music = document.getElementById("music");
const video = document.getElementById("video");

/* START ON FIRST TAP (mobile safe) */
document.body.onclick = () => {
  music.play();
  nextScene();
  document.body.onclick = null;
};

function nextScene() {

  if (scene >= timeline.length) {
    showVideo();
    return;
  }

  const current = timeline[scene];

  bg.style.opacity = 0;

  setTimeout(() => {

    if (current.bg === "black") {
      bg.style.backgroundImage = "none";
      bg.style.backgroundColor = "black";
    } else {
      bg.style.backgroundImage = `url(${current.bg})`;
    }

    bg.style.opacity = 1;
    bg.style.transform = "scale(1.05)";

    line = 0;
    showLine(current);

  }, 1500);

}

function showLine(current) {

  if (line >= current.lines.length) {
    scene++;
    setTimeout(nextScene, 3000);
    return;
  }

  text.classList.remove("show");

  setTimeout(() => {
    text.innerHTML = current.lines[line];
    text.classList.add("show");
    line++;
  }, 1200);

  setTimeout(() => {
    showLine(current);
  }, 3500);
}

function showVideo() {
  text.classList.remove("show");

  setTimeout(() => {
    video.style.display = "block";
    video.play();
  }, 2000);
}

</script>

</body>
</html>
