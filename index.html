<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#f5f1dc;
  font-family:'Caveat', cursive;
  text-align:center;
}

.center{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
  padding:20px;
}

.text{
  font-size:26px;
  max-width:90%;
  line-height:1.6;
}

img{
  width:80%;
  max-width:350px;
  margin-top:20px;
  border-radius:15px;
}

#butterfly{
  font-size:40px;
  margin-top:20px;
  cursor:pointer;
  display:none;
}

.cursor{
  display:inline-block;
  width:2px;
  background:black;
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0;}
}
</style>
</head>

<body>

<div class="center">
  <div id="text" class="text"></div>
  <img id="image" style="display:none;">
  <div id="butterfly">🦋</div>
</div>

<audio id="music" src="Twilight.mp3"></audio>

<script>

const textEl = document.getElementById("text");
const img = document.getElementById("image");
const butterfly = document.getElementById("butterfly");

let i = 0;

/* ✍️ typing */
function write(text, speed=35, cb){
  textEl.innerHTML="";
  let cursor=document.createElement("span");
  cursor.className="cursor";
  textEl.appendChild(cursor);

  let index=0;

  function type(){
    if(index < text.length){
      let c = text[index];
      if(c === "\n"){
        textEl.insertBefore(document.createElement("br"), cursor);
      } else {
        let s = document.createElement("span");
        s.textContent = c;
        textEl.insertBefore(s, cursor);
      }
      index++;
      setTimeout(type, speed);
    } else {
      cursor.remove();
      if(cb) cb();
    }
  }

  type();
}

/* 🎵 music */
function playMusic(){
  let m=document.getElementById("music");
  m.volume=0;
  m.play().catch(()=>{});
  let v=0;
  let fade=setInterval(()=>{
    if(v<0.6){v+=0.02;m.volume=v;}
    else clearInterval(fade);
  },200);
}

/* 🦋 butterflies */
function releaseButterflies(){
  for(let i=0;i<30;i++){
    let b=document.createElement("div");
    b.textContent="🦋";
    b.style.position="fixed";
    b.style.left="50%";
    b.style.top="60%";
    document.body.appendChild(b);

    let dx=(Math.random()-0.5)*500;
    let dy=(Math.random()-0.5)*500;

    b.animate([
      {transform:"translate(0,0)",opacity:1},
      {transform:`translate(${dx}px,${dy}px)`,opacity:0}
    ],{duration:2000});

    setTimeout(()=>b.remove(),2000);
  }
}

/* 📖 FULL STORY */
const pages = [

{t:"Only open if you are alone… and if so click the butterfly", btn:true},

{t:"Welcome birthday girl ❤️"},

{t:"You must wonder what is this now. Do we need answers for everything?..."},

{t:"I'm thinking about you, Patricia. What a lovely thing you are..."},

{t:"Ready for a journey?\n\nPut your headphones on.", music:true, btn:true},

{t:"You are the most special thing for me..."},

{t:"Look at yourself, how noble you look...", img:"Patricia-and-horse.jpg"},

{t:"Me and Istanbul had the best days when you were here...", img:"patricia1.jpg"},

{t:"The first time I saw you with glasses...", img:"Patricia-glasses.jpg"},

{t:"You are pure...", img:"Patricia-pure.jpg"},

{t:"The first ever photo of you...", img:"Patricia-tongue-stickout.jpg"},

{t:"You look so happy here...", img:"patricia-kid.jpg"},

{t:"Do you remember this sunset moment...", img:"sunset.jpg"},

{t:"Don't we look so cute together?", img:"Patricia-me.jpg"},

{t:"Los niños se alimentan del presente..."},

{t:"Que vueles tan libre como las mariposas.", final:true}

];

/* 🚀 FLOW */
function next(){

  img.style.display="none";
  butterfly.style.display="none";

  let p = pages[i];

  write(p.t,35,()=>{

    if(p.img){
      setTimeout(()=>{
        img.src=p.img;
        img.style.display="block";
      },800);
    }

    if(p.music){
      butterfly.style.display="block";
      butterfly.onclick=()=>{
        playMusic();
        i++;
        next();
      };
      return;
    }

    if(p.final){
      butterfly.style.display="block";
      butterfly.onclick=()=>{
        releaseButterflies();
        setTimeout(()=>{
          textEl.innerHTML="❤️<br>Te amo<br><br>Feliz cumpleaños Patricia";
        },2000);
      };
      return;
    }

    if(p.btn){
      butterfly.style.display="block";
      butterfly.onclick=()=>{
        i++;
        next();
      };
      return;
    }

    setTimeout(()=>{
      i++;
      next();
    },3000);

  });

}

next();

</script>

</body>
</html>
