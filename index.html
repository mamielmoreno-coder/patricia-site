<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  min-height:100vh;
  text-align:center;
  background:linear-gradient(135deg,#fff8ec,#f7ead7,#fffdf7);
  color:#4a3528;
  overflow:hidden;
}

.center{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  width:100%;
  padding:24px;
  box-sizing:border-box;
}

.text{
  width:min(92%, 820px);
  font-family:'Caveat', cursive;
  font-size:34px;
  line-height:1.7;
  padding:28px;
  border-radius:28px;
  background:rgba(255,255,255,0.42);
  box-shadow:0 18px 50px rgba(120,80,45,0.12);
  backdrop-filter: blur(8px);
}

#butterfly{
  font-size:46px;
  margin-top:28px;
  cursor:pointer;
  opacity:0;
  transition:opacity 1.2s ease, transform .4s ease;
}

#butterfly:hover{
  transform:scale(1.18) rotate(8deg);
}

input{
  padding:13px 18px;
  font-size:18px;
  margin-top:18px;
  border:1px solid rgba(120,80,45,0.25);
  border-radius:18px;
  outline:none;
  background:#fffaf2;
  color:#4a3528;
  font-family:'Quicksand', sans-serif;
  text-align:center;
}

button{
  padding:12px 24px;
  margin-top:14px;
  border:none;
  border-radius:20px;
  background:#8b5e3c;
  color:white;
  font-family:'Quicksand', sans-serif;
  font-size:16px;
  cursor:pointer;
  transition:0.3s ease;
}

button:hover{
  background:#6f472b;
  transform:translateY(-2px);
}

#hint{
  font-family:'Quicksand', sans-serif;
  font-size:16px;
  margin-top:10px;
  color:#6b4c38;
}

#youtube-player{
  position:fixed;
  width:1px;
  height:1px;
  opacity:0.01;
  pointer-events:none;
  right:0;
  bottom:0;
  overflow:hidden;
}

@media(max-width:600px){
  .text{
    font-size:29px;
    padding:22px;
  }

  #butterfly{
    font-size:42px;
  }
}
</style>
</head>

<body>

<div class="center">
  <div id="text" class="text"></div>
  <div id="butterfly">🦋</div>
</div>

<div id="youtube-player" aria-hidden="true"></div>

<script>
const textEl = document.getElementById("text");
const butterfly = document.getElementById("butterfly");
const playerHost = document.getElementById("youtube-player");

let i = 0;
let attempts = 0;
let musicStarted = false;

const hints = [
  "En sevdiğin renk",
  "Şaka yaptım, en sevdiğin yemek",
  "Galiba yine şaka yaptım",
  "8 yıl yaşadığın ülke…",
  "Bugün kimin özel günü"
];

function showPassword(){
  textEl.innerHTML = `
    <div style="font-family:'Quicksand', sans-serif; font-size:22px; line-height:1.6;">
      Küçük bir kapı var burada...<br>
      Açmak için şifreyi girmen gerekiyor.
      <br><br>
      <div id="hint"></div>
    </div>
  `;

  let input = document.createElement("input");
  let btn = document.createElement("button");
  btn.innerText = "Aç";

  textEl.appendChild(input);
  textEl.appendChild(document.createElement("br"));
  textEl.appendChild(btn);

  let hintEl = document.getElementById("hint");

  btn.onclick = () => {
    if(input.value.toLowerCase().trim() === "merve"){
      attempts = 0;
      i++;
      next();
    } else {
      hintEl.innerHTML = "<br>" + hints[Math.min(attempts, hints.length - 1)];
      attempts++;
    }
  };
}

function write(text){
  textEl.innerHTML = "";
  let index = 0;

  function type(){
    if(index < text.length){
      let c = text[index];

      if(c === "\n") {
        textEl.innerHTML += "<br>";
      } else {
        textEl.innerHTML += c;
      }

      index++;

      let delay = 70;
      if(".?!…".includes(c)) delay += 220;

      setTimeout(type, delay);
    } else {
      setTimeout(() => butterfly.style.opacity = 1, 900);
    }
  }

  type();
}

function moveButterfly(duration){
  let x = (Math.random() - 0.5) * 360;
  let y = -240;

  butterfly.animate([
    {transform:"translate(0,0) scale(1)", opacity:1},
    {transform:`translate(${x/2}px,${y/2}px) scale(1.2) rotate(12deg)`, opacity:0.85},
    {transform:`translate(${x}px,${y}px) scale(0.8) rotate(-10deg)`, opacity:0}
  ], {
    duration:duration,
    easing:"ease-in-out"
  });
}

function playMusic(){
  if(musicStarted) return;

  playerHost.innerHTML = `
    <iframe
      width="1"
      height="1"
      src="https://www.youtube.com/embed/MhFbPNLwg0s?autoplay=1&loop=1&playlist=MhFbPNLwg0s&controls=0&modestbranding=1&playsinline=1"
      title="Twilight"
      frameborder="0"
      allow="autoplay; encrypted-media"
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen>
    </iframe>
  `;

  musicStarted = true;
}

const pages = [
  {t:"Sadece yalnızsan aç… ve hazırsan kelebeğe tıkla.", password:true},

  {t:"Hoş geldin Merve ❤️", music:true},

  {t:"Bu sayfa sadece senin için hazırlandı."},

  {t:"Bazı şeyler uzun uzun anlatılmaz…"},

  {t:"Bazen küçük bir detay bile insanı gülümsetir."},

  {t:"Mesela 8 yıl Arjantin’de yaşamış olman…"},

  {t:"Bazı insanlar gittikleri yerlerden bir parça taşır."},

  {t:"Sen de içinde biraz Arjantin, biraz neşe, biraz hikâye taşıyorsun."},

  {t:"Ve belki de biraz Harry Potter büyüsü… ✨"},

  {t:"Bugün senin günün."},

  {t:"Ve ben bu küçük şeyi sana özel yapmak istedim."},

  {t:"", final:true}
];

function next(){
  butterfly.style.opacity = 0;

  let p = pages[i];

  write(p.t);

  if(p.password){
    butterfly.onclick = showPassword;
    return;
  }

  butterfly.onclick = () => {
    const upcomingPage = pages[i + 1];

    if(upcomingPage && upcomingPage.music){
      playMusic();
    }

    if(p.final){
      textEl.innerHTML = "❤️<br>İyi ki varsın Merve";
      butterfly.style.opacity = 0;
      return;
    }

    moveButterfly(1500);

    setTimeout(() => {
      i++;
      next();
    }, 1500);
  };
}

next();
</script>

</body>
</html>
